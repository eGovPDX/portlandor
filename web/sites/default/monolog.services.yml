parameters:
  monolog.channel_handlers:
    php:
      handlers:
        - name: 'error_log'
          formatter: 'loggly'
        - name: 'drupal.dblog'
          formatter: 'loggly'
        - name: 'loggly'
          formatter: 'loggly'
    # Ignore log entries of "content" channel.
    #content: ['null']
    cron:
      handlers:
        - name: 'drupal.dblog'
    feeds:
      handlers:
        - name: 'drupal.dblog'
    default:
      handlers:
        - name: 'portland_conditional'

  monolog.processors: ['message_placeholder', 'current_user', 'request_uri', 'ip', 'referer', 'filter_backtrace', 'hostname']

services:
  monolog.handler.loggly:
    class: Monolog\Handler\LogglyHandler
    arguments: ['58461ece-af01-4bcb-b3ab-d66a8b07dc55/tag/drupal']
  monolog.handler.browser_console:
    class: Monolog\Handler\BrowserConsoleHandler
    # Set alert as the minimum level (ignores emergency) and disable bubbling for this Handler
    arguments: ['1', false]
  monolog.processor.hostname:
    class: Drupal\portland\Logger\Processor\HostnameProcessor
    arguments: ['@request_stack']

  # The resolver will only log the listed hostnames.
  monolog.condition_resolver.hostname:
    class: Drupal\portland\Logger\ConditionResolver\HostnameResolver
    arguments: ['@request_stack', 
      [
        'www.portland.gov',
        'employees.portland.gov',
        'pgov-364-portlandor.pantheonsite.io',
      ]
    ]
    shared: false

  # Group handler for both dblog and Loggly. Used by the conditional handler below.
  monolog.handler.dblog_and_loggly:
    class: Monolog\Handler\GroupHandler
    arguments: [['@monolog.handler.drupal.dblog', '@monolog.handler.loggly']]
    shared: false

  # Call the hostname resolver to determine if the log should be sent to both dblog 
  # and Loggly or just dblog.
  monolog.handler.portland_conditional:
    class: Drupal\portland\Logger\Handler\ConditionalHandlerAdapter
    arguments: ['@monolog.handler.dblog_and_loggly', '@monolog.handler.drupal.dblog', '@monolog.condition_resolver.hostname']
    shared: false
