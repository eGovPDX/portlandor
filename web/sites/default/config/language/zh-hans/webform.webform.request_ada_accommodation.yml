    '#description': '<p>我们将使用您的电子邮件回复您的反馈或请求。</p>'
    '#pattern_error': '请输入格式正确的电子邮件地址，例如 myname@example.com。'
  contact_phone:
    '#title': 电话
  contact_phone_assistance_type:
