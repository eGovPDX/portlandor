elements: |
  report_confirm_non_emergency:
    '#title': 'के यो कसैलाई चोट लागेको वा सक्रिय आगलागी भएको कुनै अत्यावश्यक, ज्यानको जोखिम हुने समस्या हो? '
  markup_urgent_public:
    '#markup': '<div class="alert alert--warning next-steps"><p><strong>कृपया यो फाराम भर्न छाडेर 911 मा कल गर्नुहोस्।</strong></p></div>'
  markup_01:
    '#markup': '<p><strong>जारी राख्न कृपया कुनै एउटा छनौट गर्नुहोस्।</strong></p>'
  markup:
    '#markup': '<p><em><strong>वर्षको उच्च मात्रामा कल आउने समयमा कानुन प्रवर्तन निकायसँग आपत्कालीन बाहेकका  सबै कलहरूको जवाफ दिनका लागि स्रोतहरू हुँदैन। आगलागी अनुसन्धानकर्ताहरूले पटाकासँग सम्बन्धित सबै आगलागीहरूको अनुसन्धान गर्ने छन् र उल्लङ्घन गर्नेहरूलाई जिम्मेवार बनाइने छ।</strong></em></p>'
  report_location_of_reporter:
    '#location_address__title': 'पटाका सुन्दा कृपया आफ्नो स्थान बताउनुहोस्'
    '#location_address__description': 'उदाहरणका लागि, तपाईंको घरको ठेगाना'
    '#unit_number__title': 'युनिट नम्बर'
    '#location_city__title': 'सहर'
    '#location_state__title': 'राज्य'
    '#location_zip__title': 'जिप कोड'
  report_confirm_known_location:
    '#title': 'तपाईंलाई पटाका पड्काइएको ठाउँ थाहा छ?'
  report_incident_location:
    '#title': 'घटनास्थल'
  report_location:
    '#title': 'घटनास्थल'
    '#location_search__title': 'स्थान खोजी'
    '#location_search__description': 'नक्सामा ठेगाना, क्रस स्ट्रिट, पार्क वा सामुदायिक केन्द्र खोज्नुहोस्। अथवा कुनै स्थानमा क्लिक गर्न नक्सा प्रयोग गर्नुहोस्।'
    '#location_details__title': 'स्थानसम्बन्धी विवरण'
    '#location_details__description': 'तपाईंले रिपोर्ट गरिरहनुभएको स्थल पत्ता लगाउन हामीलाई मद्दत गर्न सक्ने कुनै पनि अन्य विवरण प्रदान गर्नुहोस्।'
  report_date:
    '#title': 'घटनाको मिति'
  report_time:
    '#title': 'घटनाको अनुमानित समय'
  report_incident_description:
    '#title': 'घटनाको कुनै पनि उपयोगी विवरण प्रदान गर्नुहोस्'
    '#description': '<p>उदाहरणका लागि: घरको रङ, घरधनी, सम्बन्धित सवारी साधन, तपाईंसँग घटनाको भिडियो वा मिडिया छ कि छैन। आवश्यक परेमा, कसैले तपाईंलाई फोटो वा भिडियो कसरी पेस गर्ने भन्नेबारे निर्देशनहरू सहित सम्पर्क गर्ने छन्।</p>'
  section_contact:
    '#title': 'तपाईंको सम्पर्क जानकारी'
    '#description': '<p>कृपया ध्यान दिनुहोस्: सीमित स्रोतसाधनका कारण तपाईंले यस रिपोर्टको जवाफको अपेक्षा गर्नु हुँदैन।</p>'
  contact_name:
    '#title': 'नाम'
  contact_email:
    '#title': 'इमेल'
    '#description': '<p>हामी तपाईंले पेस गर्नुभएको सामग्री पुष्टि गर्न तपाईंको इमेल प्रयोग गर्ने छौँ।</p>'
  contact_phone:
    '#title': 'फोन'
  section_confidentiality:
    '#title': 'गोपनीयता'
  confidentiality_waiver:
    '#title': 'गोपनीयता छुट'
    '#description': '<p>तपाईंको अनुरोध पूरा गर्ने उद्देश्यले यस फाराममा प्रदान गर्नुभएको विवरण गोप्य राख्नु सहरको नीति हो। कसैले तपाईंको विवरण <a href="/attorney/oregon-public-records-law">ओरेगन सार्वजनिक अभिलेख कानुन</a> अन्तर्गत सार्वजनिक रेकर्डको रूपमा जारी गर्न अनुरोध गरेमा पनि सहरले तपाईंको विवरण गोप्य राख्ने प्रयास गर्ने छ। तपाईं यो गोपनीयता त्याग गर्न चाहनुहुन्छ भने कृपया तलको त्यो विकल्प चयन गर्नुहोस्।</p>'
    '#options':
      'I do not waive confidentiality': 'म गोपनीयता त्याग <em>गर्दिन।</em>'
      'I waive confidentiality': 'म गोपनीयता त्याग गर्ने विकल्प छनौट गर्छु।'
settings:
  confirmation_title: 'नासो पेस गर्नुभएकोमा धन्यवाद!'
  confirmation_message: '<p>तपाईंले पेस गर्नुभएको रिपोर्ट (#[webform_submission:values:report_ticket_id]) प्राप्त भएको छ।</p><p>वर्षको धेरै मात्रामा कल आउने समयमा कानुन प्रवर्तन निकायसँग आपत्कालीन बाहेकका सबै कलहरूको जवाफ दिन स्रोतहरू हुँदैन। पटाकासम्बन्धी आउने धेरैजसो गुनासोहरूको जवाफ दिन स्रोतहरू उपलब्ध नभए पनि हामी पटाका प्रतिबन्धको पालना गर्न जारी प्रयासहरूका लागि जानकारी सङ्कलन गरिरहेका छौँ। यस रिपोर्टको बारेमा तपाईंले कलब्याकको अपेक्षा गर्नु हुँदैन।</p><p>आगलागी अनुसन्धानकर्ताहरूले पटाकासँग सम्बन्धित सबै आगलागीहरूको अनुसन्धान गर्ने छन् र उल्लङ्घन गर्नेहरूलाई जिम्मेवार बनाइने छ।</p><p>पटाकाले गर्दा कसैलाई चोट लागेको छ वा केही कुरामा आगो लागेको छ भने 911 मा कल गर्नुहोस्।&nbsp;</p>'
