title: 'Отзыв о сайте'
description: '<p>Эта веб-форма используется для сбора отзывов о веб-сайте от пользователей и редакторов.</p>'
elements: |
  subject:
    '#title': 'Тип обратной связи'
    '#options':
      "I cannot find what I'm looking for": 'Я не могу найти то, что ищу'
      'I have a question': 'у меня есть вопрос'
      'The page looks broken': 'Страница выглядит битой'
      'The information looks incorrect': 'Информация выглядит неверно'
      'Contact an elected official with feedback': 'Связаться с избранным должностным лицом с обратной связью'
      'Fix an accessibility issue with a City app or website': 'Исправить проблему с доступностью в приложении или на сайте города'
    '#empty_option': '-- Выбирать --'
  link_to_contact_elected:
    '#markup': '<div class="alert alert--info next-steps"><h2>Следующие шаги</h2><p>Пожалуйста, используйте <a href="/help/contact-elected-official">форму «Связаться с избранным должностным лицом»</a> , чтобы отправить отзыв или запросить встречу.</p></div>'
  feedback:
    '#title': Подробности
    '#description': '<p>Пожалуйста, будьте конкретны, чтобы мы могли лучше помочь вам.</p>'
  your_name:
    '#title': 'Ваше имя'
  email_address:
    '#title': 'Ваш адрес электронной почты'
  page_you_last_viewed:
    '#title': 'Страница, которую вы просматривали в последний раз'
    '#description': '<p>Вы можете изменить этот адрес, если предпочитаете комментировать другую страницу.</p>'
    '#default_value': '[server:HTTP_REFERER]'
  public_records_statement:
    '#markup': '<p>Информация, которую вы предоставляете в этой форме, считается общедоступной записью в соответствии с <a href="/attorney/oregon-public-records-law" data-renderer-mark="true">Законом штата Орегон о государственных записях</a> и доступна для общественности по запросу.</p>'
  actions:
    '#title': 'Кнопка(и) Отправить'
  ip_address:
    '#title': 'Айпи адрес'
settings:
  form_close_message: '<p>Наша форма обратной связи временно закрыта. Если у вас есть отзывы или предложения о том, как мы можем улучшить эту страницу, отправьте электронное письмо веб-команде по адресу powr@portlandoregon.gov.</p>'
  confirmation_message: '<h2>Благодарим вас за оставленный отзыв, мы ценим вашу помощь!</h2><p>Через мгновение вы должны получить подтверждение по электронной почте. Вы можете ответить на это письмо, чтобы добавить дополнительную информацию или комментарии к своему отзыву.<br><br>Имя: [webform_submission:values:your_name]<br><br>Электронная почта: [webform_submission:values:email_address]<br><br>Тип отзыва: [webform_submission:values:subject]<br><br>Последняя просмотренная страница: <a href="[webform_submission:values:page_you_last_viewed]">[webform_submission:values:page_you_last_viewed]</a><br><br>Обратная связь: [webform_submission:values:feedback]</p>'
handlers:
  submit_report_to_311:
    label: 'Отправить отчет на 311'
    notes: ''
    settings:
      from_name: ''
      body: '<p>Тема: [webform_submission:values:subject]</p><p>Обратная связь: [webform_submission:values:feedback]</p><p>Имя: [webform_submission:values:your_name]</p><p>Электронная почта: [webform_submission:values:email_address]</p><p>Последняя просмотренная страница: [webform_submission:values:page_you_last_viewed]</p><p>Отправлено: [webform_submission:created]</p><p>Пользовательский агент: [server:HTTP_USER_AGENT]</p><p>[webform_submission:values:agent_summary]</p>'
  submit_report_to_website_support:
    label: 'Отправить отчет в службу поддержки сайта'
    notes: ''
    settings:
      from_name: ''
      body: '<p>Тема: [webform_submission:values:subject]</p><p>Обратная связь: [webform_submission:values:feedback]</p><p>Имя: [webform_submission:values:your_name]</p><p>Электронная почта: [webform_submission:values:email_address]</p><p>Последняя просмотренная страница: [webform_submission:values:page_you_last_viewed]</p><p>Отправлено: [webform_submission:created]</p><p>Пользовательский агент: [server:HTTP_USER_AGENT]<br><br>[webform_submission:values:agent_summary]</p>'
