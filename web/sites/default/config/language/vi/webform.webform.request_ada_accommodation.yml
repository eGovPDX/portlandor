      accessible_entrance: 'Lối vào sự kiện và các tuyến đường dẫn đến phòng vệ sinh'
      communication_aids: 'Hỗ trợ giao tiếp'
      accessible_materials: 'Vật liệu ở định dạng có thể truy cập được'
    '#other__option_label': 'Thứ gì khác...'
