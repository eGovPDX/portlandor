title: 'Yêu cầu chỗ ở của ADA'
elements: |
  request_how:
    '#title': 'Bạn muốn thực hiện yêu cầu của mình như thế nào?'
    '#options':
      'I would like to call the City': 'Tôi muốn liên hệ với Thành phố qua điện thoại hoặc TTY'
      'I will continue with the online form': 'Tôi sẽ tiếp tục với biểu mẫu trực tuyến'
  markup_continue:
    '#markup': '<p class="mt-5"><strong>Vui lòng chọn để tiếp tục.</strong></p>'
  request_call_city_text_stop:
    '#markup': '<div class="webform-alert alert alert--info"><h2>Bước tiếp theo</h2><p>Vui lòng gọi cho chúng tôi theo <a href="tel:311">số 311</a> , <a href="tel:+15038234000">(503) 823-4000</a> , hoặc <a href="tel:711">711</a> để biết TTY qua Dịch vụ Chuyển tiếp Oregon. Nhân viên làm việc từ Thứ Hai đến Thứ Sáu, từ 8 giờ sáng đến 5 giờ chiều, trừ các ngày Lễ của Liên bang.</p></div>'
  request_who:
    '#title': 'Bạn đang đưa ra yêu cầu hoặc khiếu nại này cho ai?'
    '#options':
      Myself: 'Chính tôi'
      'Someone else': 'Một người khác'
      'Neither of these apply to me': 'Cả hai điều này đều không áp dụng cho tôi.'
  request_who_myself_text:
    '#markup': '<div class="webform-alert alert alert--info"><h2>Thông tin</h2><p>Bằng việc lựa chọn tùy chọn này, tôi xác nhận rằng tôi có một khuyết tật thuộc phạm vi điều chỉnh của Đạo luật Người khuyết tật Hoa Kỳ (Americans with Disabilities Act), và rằng các thông tin tôi cung cấp trong biểu mẫu này là đúng sự thật, theo hiểu biết và niềm tin tốt nhất của tôi.</p></div>'
  request_someone_else_myself_text:
    '#markup': '<div class="webform-alert alert alert--info"><h2>Thông tin</h2><p>Bằng việc lựa chọn tùy chọn này, tôi xin xác nhận rằng người mà tôi đang thực hiện yêu cầu hoặc khiếu nại này thay mặt có một khuyết tật thuộc phạm vi điều chỉnh của Đạo luật Người khuyết tật Hoa Kỳ (Americans with Disabilities Act), và rằng các thông tin tôi cung cấp trong biểu mẫu này là đúng sự thật, theo hiểu biết và niềm tin tốt nhất của tôi.</p></div>'
  request_who_neither_text:
    '#markup': '<div class="webform-alert alert alert--info"><h2>Thông tin</h2><p>Lựa chọn này được sử dụng khi quý vị muốn báo cáo một quan sát, vấn đề hoặc mối lo ngại mà quý vị tin rằng có thể ảnh hưởng hoặc gây ra mối đe dọa đối với công chúng, đặc biệt là những người khuyết tật. Vui lòng liên hệ với chúng tôi qua số <a href="tel:311">311</a> hoặc địa chỉ email <a href="311@portlandoregon.gov">311@portlandoregon.gov</a> để được hỗ trợ.</p></div>'
  request_on_behalf_of_permission:
    '#title': 'Bạn đã nhận được sự cho phép từ họ để nộp đơn khiếu nại này chưa? Hoặc, bạn có mối quan hệ pháp lý nào cho phép bạn thực hiện việc khiếu nại thay mặt cho họ hay không?'
  request_on_behalf_of_name:
    '#title': 'Tên của họ là gì?'
  request_on_behalf_of_permission_text_stop:
    '#markup': '<div class="webform-alert alert alert--info"><h2>Các bước tiếp theo</h2><p>Vui lòng xin phép họ trước khi gửi biểu mẫu này.</p></div>'
  container_confidentiality:
    '#title': 'Bảo mật'
  confidentiality_waiver:
    '#title': 'Từ bỏ bảo mật'
    '#description': '<p>Chính sách của Thành phố là giữ bí mật thông tin bạn cung cấp trên biểu mẫu này. Thông tin của bạn sẽ được giữ bí mật trừ khi bạn đánh dấu vào ô xác nhận rằng bạn muốn từ bỏ tính bảo mật.</p>'
    '#options':
      'I do not waive confidentiality': 'Tôi <em>không</em> từ bỏ tính bảo mật.'
      'I waive confidentiality': 'Tôi chọn từ bỏ tính bảo mật.'
  request_what:
    '#title': 'Tôi muốn yêu cầu Thành phố ...'
    '#options':
      event_accommodations: 'Cung cấp chỗ ở cho một hoạt động, sự kiện hoặc chương trình của Thành phố'
      parks_activity_registration: 'Cung cấp các hỗ trợ điều chỉnh cho quy trình đăng ký và thiết lập tài khoản đối với các hoạt động của Portland Parks & Recreation.'
      city_materials: 'Cung cấp tài liệu về Thành phố ở định dạng mà tôi có thể truy cập được'
      app_accessibility: 'Khắc phục sự cố về khả năng tiếp cận đối với ứng dụng hoặc trang web của Thành phố'
      remove_barrier: 'Loại bỏ rào cản hoặc giúp tôi tiếp cận đường phố, vỉa hè, đường nhỏ, công viên hoặc không gian khác thuộc sở hữu của Thành phố dễ dàng hơn (chẳng hạn như loại bỏ chướng ngại vật trên vỉa hè, thêm lối đi qua đường hoặc cải thiện biển báo)'
      change_policy: 'Thay đổi hoặc sửa đổi chính sách hoặc thủ tục (ví dụ: cho phép các thành viên cộng đồng khuyết tật sớm tham gia một sự kiện, cho phép một người bạn đồng hành tham gia một lớp học hoặc hoạt động)'
    '#other__option_label': 'Thứ gì khác...'
    '#other__description': 'Vui lòng mô tả yêu cầu của bạn. Không bao gồm bất kỳ thông tin cá nhân hoặc thông tin liên quan đến sức khỏe nào.'
  request_parks_assistance:
    '#title': 'Bạn cần loại hỗ trợ nào?'
    '#options':
      'Setting up my ActiveNet account (the system Portland Parks and Recreation uses for class/recreation registrations)': 'Thiết lập tài khoản ActiveNet của tôi (hệ thống mà Portland Parks and Recreation sử dụng để đăng ký các lớp học và hoạt động giải trí).'
      'Instructions and resources to help me get signed up for upcoming recreation activities': 'Hướng dẫn và tài nguyên giúp tôi đăng ký tham gia các hoạt động giải trí sắp tới.'
  container_materials:
    '#title': 'Yêu cầu tài liệu'
  request_materials_type:
    '#title': 'Vật liệu bạn đang yêu cầu có phải ...'
    '#options':
      website: 'trên trang web của Thành phố?'
      event: 'cho một sự kiện hoặc hoạt động cụ thể?'
      printed: 'một tài liệu in không có sẵn trực tuyến?'
    '#other__option_label': 'Thứ gì khác...'
    '#other__description': 'Hãy mô tả các vật liệu.'
  request_materials_url:
    '#title': 'Địa chỉ web (URL) của trang chứa tài liệu là gì?'
  request_materials_description:
    '#title': 'Tên và / hoặc mô tả của tài liệu'
  page_you_last_viewed:
    '#title': 'Trang bạn đã xem lần cuối'
  continue_button:
    '#markup': '<p><a class="button button--primary" href="/feedback?page_you_last_viewed=[server:HTTP_REFERER]&amp;subject=Fix%20an%20accessibility%20issue%20with%20a%20City%20app%20or%20website" aria-label="Tiếp tục báo cáo vấn đề về khả năng tiếp cận đối với ứng dụng hoặc trang web của thành phố">Tiếp tục báo cáo sự cố ứng dụng hoặc trang web</a></p>'
  container_event:
    '#title': 'chi tiết sự kiện'
  request_event_name:
    '#title': 'Tên hoạt động, sự kiện hoặc chương trình'
  request_event_date:
