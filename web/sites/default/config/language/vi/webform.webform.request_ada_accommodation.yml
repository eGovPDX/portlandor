    '#other__option_label': 'Thứ gì khác...'
    '#other__description': 'Vui lòng mô tả yêu cầu của bạn. Không bao gồm bất kỳ thông tin cá nhân hoặc thông tin liên quan đến sức khỏe nào.'
  request_event_materials_format:
