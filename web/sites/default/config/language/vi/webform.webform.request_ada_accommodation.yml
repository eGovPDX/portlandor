    '#description': '<p>Vui lòng nêu rõ văn phòng, văn phòng, chương trình, dự án của Thành phố hoặc quan chức được bầu cử đang tổ chức sự kiện, nếu bạn biết.</p>'
  request_event_url:
    '#title': 'URL chi tiết sự kiện'
    '#description': '<p>Vui lòng sao chép và dán địa chỉ URL của sự kiện, chương trình hoặc trang web của tài liệu, nếu biết.</p>'
