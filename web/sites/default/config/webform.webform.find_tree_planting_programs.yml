id: find_tree_planting_programs
title: 'Find Tree Planting Programs'
description: 'UF Tree Navigation Form'
categories:
  - Utility
elements: |-
  apply_planting_location:
    '#type': select
    '#title': 'I would like my free trees planted in a...'
    '#options':
      'Planting Strip': 'Planting strip (right-of-way or street)'
      'Front Yard': 'Front yard (private property)'
      'Back Yard': 'Back yard (private property)'
      'Apartment complex': 'Apartment complex'
      'Business': 'Business (commercial or industrial)'
      'School yard': 'School yard'
    '#required': true
  apply_address:
    '#type': portland_address_verifier
    '#title': 'Planting address'
    '#states':
      visible:
        - ':input[name="apply_planting_location"]':
            value: 'Planting Strip'
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Front Yard'
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Apartment complex'
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Business'
    '#location_address__title': 'What is the address where you want your free trees planted?'
    '#location_address__description': |
      Begin typing to see a list of possible address matches in the Portland metro area, then select one. Do not include unit number.

      <strong>This information is only used to identify your neighborhood and is not stored.</strong>
    '#unit_number__access': false
    '#location_capture_field__title': 'Your neighborhood is:'
    '#location_capture_field__type': textfield
    '#secondary_query_url': 'https://www.portlandmaps.com/arcgis/rest/services/Public/Boundaries/MapServer/11/query?where=1=1&f=json&outFields=MAPLABEL&geometryType=esriGeometryPoint&returnGeometry=false'
    '#secondary_query_capture_property': features.attributes.MAPLABEL
    '#secondary_query_capture_field': location_capture_field
    '#require_portland_city_limits': 1
    '#out_of_bounds_message': 'This address is not within the City of Portland limits and therefore is ineligible for any of the programs offered by Urban Forestry.'
    '#location_capture_field__readonly': true
    '#location_capture_field__states':
      visible:
        ':input[name="apply_address[location_verification_status]"]':
          value: Verified
  markup_might_qualify:
    '#type': webform_markup
    '#states':
      invisible:
        - ':input[name="apply_planting_location"]':
            value: ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Planting Strip'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: "^(|Alameda|Arbor Lodge|Ardenwald-Johnson Creek|Arlington Heights|Arnold Creek|Ashcreek-Crestwood|Bridgeton|Bridlemile|Collins View|Portland Downtown|Eastmoreland|Far Southwest|Forest Park|Goose Hollow|Hayhurst|Hillsdale|Hillside|Homestead|Irvington|Laurelhurst|Linnton|Maplewood|Markham|Marshall Park|Mt. Tabor|Multnomah|Northwest District|Northwest Heights|Old Town|Overlook|Pearl District|Pleasant Valley|Reed|Richmond|Roseway|Sabin|Sellwood-Moreland|South Burlingame|South Portland|Southwest Hills|Sunnyside|Sylvan-Highlands|University Park|West Portland Park|Woodland Park)$"
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Front Yard'
          ':input[name="apply_address[location_capture_field]"]':
            value: ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Apartment complex'
          ':input[name="apply_address[location_capture_field]"]':
            value: ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Business'
          ':input[name="apply_address[location_capture_field]"]':
            value: ''
    '#markup': '<hr><p><strong>You might qualify for the following programs:</strong></p>'
  container_neighborhood_based:
    '#type': container
    markup_planting_strip_ineligible:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value: 'Planting Strip'
          ':input[name="apply_address[location_verification_status]"]':
            value: Verified
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: "^(|Alameda|Arbor Lodge|Ardenwald-Johnson Creek|Arlington Heights|Arnold Creek|Ashcreek-Crestwood|Bridgeton|Bridlemile|Collins View|Portland Downtown|Eastmoreland|Far Southwest|Forest Park|Goose Hollow|Hayhurst|Hillsdale|Hillside|Homestead|Irvington|Laurelhurst|Linnton|Maplewood|Markham|Marshall Park|Mt. Tabor|Multnomah|Northwest District|Northwest Heights|Old Town|Overlook|Pearl District|Pleasant Valley|Reed|Richmond|Roseway|Sabin|Sellwood-Moreland|South Burlingame|South Portland|Southwest Hills|Sunnyside|Sylvan-Highlands|University Park|West Portland Park|Woodland Park)$"
      '#admin_title': 'Planting Strip - Neighborhood Ineligible'
      '#markup': '<hr><div class="webform-alert alert alert--info"><h2>Currently this neighborhood does not qualify</h2><p>At this time we do not have a program working in your neighborhood for planting strip planting. Email <a href="mailto:freetrees@portlandoregon.gov">freetrees@portlandoregon.gov</a> to join our waitlist and be notified when we come to your neighborhood. Or, if you have room on your private property, consider signing up for a tree from <a href="https://www.portland.gov/trees/tree-planting/find-your-free-trees/trees-your-yard">Yard Tree Giveaway</a>.</p></div>'
    markup_businesses:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value: 'Business'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: '^(Argay Terrace|Bridgeton|Brooklyn|Buckman|Cathedral Park|Cully|East Columbia|Eliot|Hayden Island|Hosford-Abernethy|Kenton|Kerns|Linnton|Lloyd|MC Unclaimed #14|Northwest District|Overlook|Parkrose|St. Johns|Sumner|Sunderland|University Park|Wilkes)$'
      '#admin_title': 'Business'
      '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for Businesses</h2><p>Own or manage a large property? Commercial and industrial sites can sign up to have free trees planted. These trees come with three years of watering and care—so they’re low-maintenance for you and set up for a healthy future. We focus on bringing shade and beauty to properties with space for many trees.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/find-your-free-trees/trees-businesses">Trees for Businesses</a></p></div></div>'
    markup_apartments:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value: 'Apartment complex'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: '^(Argay Terrace|Brooklyn|Buckman|Centennial|Cathedral Park|Cully|East Columbia|Eliot|Glenfair|Hayden Island|Hazelwood|Hosford-Abernethy|Kenton|Kerns|Lents|Linnton|Lloyd|Mill Park|Montavilla|Northwest District|Overlook|Parkrose|Parkrose Heights|Powellhurst-Gilbert|Russell|St. Johns|Sumner|Sunderland|University Park|Wilkes)$'
      '#admin_title': 'Apartments'
      '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for Apartments</h2><p>Bring more beauty, fresh air, and shade to multi-family living spaces! Apartment and multi-unit residential communities in Portland can receive free trees to enhance shared outdoor areas for residents to enjoy. We work with property owners and managers to select the right trees for the space and provide planting, watering, and care for the first three years—helping promote healthy growth and long-lasting benefits for your community.  Renters are welcome to inquire about eligibility.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/find-your-free-trees/trees-apartment-communities">Trees for Apartments</a></p></div></div>'
    markup_fst_irow:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value: 'Planting Strip'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: "^(Beaumont-Wilshire|Brentwood-Darlington|Brooklyn|Grant Park|Hollywood|Hosford-Abernethy|Madison South|North Tabor|Rose City Park|Sullivan's Gulch|Vernon|Woodstock)$"
      '#admin_title': 'FST IROW'
      '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for Planting Strips</h2><p>Each year, we plant free street trees in neighborhoods with the fewest trees. If your planting strip—the space between the sidewalk and the street—is at least four feet wide, your property may be eligible. No need to sign up—City staff will contact eligible property owners directly. This program provides the tree, planting, and three years of watering, all for free.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/tree-planting/find-your-free-trees/trees-planting-strips">Free Street Trees</a></p></div></div>'
    markup_fst_urow:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value:
              pattern: 'Planting Strip|Front Yard'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: '^(Argay Terrace|Centennial|Cully|East Columbia|Glenfair|Hayden Island|Hazelwood|Lents|Mill Park|Montavilla|Parkrose|Parkrose Heights|Powellhurst-Gilbert|Russell|Sumner|Sunderland|Wilkes)$'
      '#admin_title': 'FST UROW'
      '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for Residential Streets</h2><p>Need more shade in your neighborhood? Residents can sign up to have free trees planted along the street or in their front yards. These trees come with three years of watering and care—so they’re low-maintenance for you and set up for a healthy future. We focus on neighborhoods with the highest need for tree canopy and on streets that lack curbs or sidewalks.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/tree-planting/find-your-free-trees/trees-residential-streets">Trees for Residential Streets</a></p></div></div>'
    markup_fot:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="apply_planting_location"]':
            value:
              pattern: 'Planting Strip|Apartment complex'
          ':input[name="apply_address[location_capture_field]"]':
            value:
              pattern: '^(Argay Terrace|Boise|Brooklyn|Buckman|Cathedral Park|Centennial|Creston-Kenilworth|Cully|East Columbia|Eliot|Foster-Powell|Glenfair|Hazelwood|Humboldt|Kenton|Kerns|King|Lents|Lloyd|Mill Park|Montavilla|Mt. Scott-Arleta|Parkrose|Parkrose Heights|Piedmont|Portsmouth|Powellhurst-Gilbert|Russell|South Tabor|St. Johns|Sumner|Wilkes|Woodlawn)$'
      '#admin_title': 'Friends of Trees'
      '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees from Friends of Trees</h2><p><drupal-entity data-align="right" data-entity-type="media" data-entity-uuid="e6e93891-5cec-46cb-bd29-fe061c04f0c6" data-embed-button="image_browser" data-entity-embed-display="view_mode:media.embedded"></drupal-entity></p><p>Urban Forestry partners with Friends of Trees to plant free trees in select Portland neighborhoods. Trees can be planted along the street or on private property. Street trees receive three years of watering and care. Visit the Friends of Trees website to sign up and for more information.</p><p><a class="btn-cta-outline" href="https://friendsoftrees.org/get-a-tree/">Friends of Trees</a></p></div></div>'
  message_school:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="apply_planting_location"]':
          value: 'School yard'
    '#admin_title': 'School Yard - Learning Landscapes'
    '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for Schools</h2><p>Students of all ages can get their hands dirty planting trees with Urban Forestry at their schools! Schools receive planning, free trees, planting, and three years of water and care through the Learning Landscapes program. Applications are accepted year-round and tree plantings occur in the fall and winter.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/tree-planting/trees-schools">Learning Landscapes</a></p></div></div>'
  markup_ytg:
    '#type': webform_markup
    '#states':
      visible:
        - ':input[name="apply_planting_location"]':
            value: 'Front Yard'
          ':input[name="apply_address[location_capture_field]"]':
            '!value': ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Apartment complex'
          ':input[name="apply_address[location_capture_field]"]':
            '!value': ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Business'
          ':input[name="apply_address[location_capture_field]"]':
            '!value': ''
        - or
        - ':input[name="apply_planting_location"]':
            value: 'Back Yard'
    '#admin_title': 'Yard Tree Giveaway'
    '#markup': '<div class="card mb-4"><div class="card-body"><h2 class="card-title mt-0">Trees for your Yard</h2><p>Portlanders can receive up to three free trees for their yards! Choose from evergreens, flowering trees, nut-bearing, and trees rich with autumn colors. Trees must be planted on private property (not in planting strips) and cared for by the recipient. While we hold giveaway events in neighborhoods with the greatest need for tree cover, all Portland residents are able to participate. Registration opens each September for fall pick-up locations across the city.</p><p><a class="btn-cta-outline" href="https://www.portland.gov/trees/tree-planting/find-your-free-trees/trees-your-yard">Yard Tree Giveaway</a></p></div></div>'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit_hide': true
