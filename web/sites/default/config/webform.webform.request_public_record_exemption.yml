id: request_public_record_exemption
title: 'Request a Public Record Exemption'
description: ''
categories: {  }
elements: |-
  section_user_type:
    '#type': webform_section
    request_user_type:
      '#type': radios
      '#title': 'Which of the following best describes you?'
      '#options':
        'I am a Community Member looking to have my personal information redacted from certain City Records': 'I am a Community Member looking to have my personal information redacted from certain City Records'
        'I am a Government Attorney looking to request the city exempt specific personal information from public disclosure': 'I am a Government Attorney looking to request the city exempt specific personal information from public disclosure'
      '#options_display': buttons_vertical
    markup_make_selection:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="request_user_type"]':
            unchecked: true
      '#markup': '<p><strong>Please make a selection to continue.</strong></p>'
  section_confidentiality:
    '#type': webform_section
    '#title': Confidentiality
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
    report_confidentiality:
      '#type': radios
      '#title': 'I request that all the information I provide on this form, along with any attached documents, be kept confidential:'
      '#options':
        'Yes, I request confidentiality': 'Yes, I request confidentiality -- This confirms your intention is to submit this form in confidence regardless of whether your exemption is granted or not.'
        'No, I waive confidentiality': 'No, I waive confidentiality -- This could result in the subsequent public disclosure of any nonexempt information provided in this form.'
      '#required': true
  section_contact:
    '#type': webform_section
    '#title': 'Your Contact Information'
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
    contact_first_name:
      '#type': textfield
      '#title': 'First Name'
    contact_last_name:
      '#type': textfield
      '#title': 'Last Name'
    contact_aliases:
      '#type': textfield
      '#title': 'Aliases, AKAs, maiden names, other names used'
    contact_city_employee:
      '#type': radios
      '#title': 'Are you currently employed by the City of Portland?'
      '#options': yes_no
    contact_cop_bureau:
      '#type': textfield
      '#title': 'Bureau/Office where you work'
      '#states':
        visible:
          ':input[name="contact_city_employee"]':
            value: 'Yes'
    contact_cop_prnr:
      '#type': textfield
      '#title': 'PRNR Employee Number:'
      '#states':
        visible:
          ':input[name="contact_city_employee"]':
            value: 'Yes'
    contact_names_other:
      '#type': textarea
      '#title': 'Names of family members whose safety is at risk'
      '#description': '<p>Only include family members who currently reside with you.</p>'
      '#description_display': before
    contact_email:
      '#type': textfield
      '#title': 'Contact Email'
      '#description': '<p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:;" inter="" var",="" arial,="" helvetica,="" sans-serif,="" "segoe="" ui="" emoji",="" symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin:0px;orphans:2;scrollbar-color:rgb(135,="" 141,="" 171)="" rgba(0,="" 0,="" 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"="">This is the email we will use to communicate with you regarding your request.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:;" inter="" var",="" arial,="" helvetica,="" sans-serif,="" "segoe="" ui="" emoji",="" symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin:0px;orphans:2;scrollbar-color:rgb(135,="" 141,="" 171)="" rgba(0,="" 0,="" 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"="">&nbsp;</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:;" inter="" var",="" arial,="" helvetica,="" sans-serif,="" "segoe="" ui="" emoji",="" symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin:0px;orphans:2;scrollbar-color:rgb(135,="" 141,="" 171)="" rgba(0,="" 0,="" 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"="">NOTE: If this is the same as a personal email address you are seeking to withhold from disclosure you must include it both here <strong style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);">AND </strong>in the "<strong style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);">Personal Email</strong>" field in the next section.</p>'
      '#description_display': before
      '#required': true
      '#pattern': '^[a-zA-Z0-9.%+-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'
      '#pattern_error': 'Please enter a correctly formatted email address, such as myname@example.com.'
  section_personal_information:
    '#type': webform_section
    '#title': 'Personal Information'
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
    personal_email:
      '#type': textfield
      '#title': 'Personal Email'
      '#description': '<p>Personal electronic mail addresses sought to be kept confidential. Business, work, government, and other public accounts are not eligible for this exemption.</p>'
      '#description_display': before
      '#pattern': '^[a-zA-Z0-9.%+-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'
      '#pattern_error': 'Please enter a correctly formatted email address, such as myname@example.com.'
    personal_home_address:
      '#type': portland_address_verifier
      '#title': 'Home Address'
      '#location_address__title': 'Mailing Address'
    personal_phone_number:
      '#type': textfield
      '#title': 'Personal Telephone Number'
      '#input_mask': '(999) 999-9999'
  request_records_id:
    '#type': webform_section
    '#title': 'Identify the Records'
    '#description': '<p>Please indicate which records you would like the City of Portland to exempt by checking the appropriate boxes below. Providing as much detail as possible will greatly assist in successfully exempting your information.</p>'
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
    request_which_records:
      '#type': webform_checkboxes_other
      '#title': 'I request that those portions of records containing my home address, email, or phone number (as specified above) be redacted or withheld from public disclosure: '
      '#options':
        '311 Calls': '311 Calls -- Specify date(s)'
        '911 Calls': '911 Calls -- Specify date(s); Case number(s)'
        'City Classes or Events': 'City Classes or Events'
        'City Permit Records': 'City Permit Records'
        'City Taxes': 'City Taxes'
        'Elections Candidate Filing': 'Elections Candidate Filing'
        'Email To/From the City': 'Email To/From the City'
        'HR - Employment Applications and Resumes': 'HR - Employment Applications and Resumes'
        'Police Records': 'Police Records -- Specify date(s); Case number(s)'
        PortlandMaps: PortlandMaps
        'Public Comments': 'Public Comments'
        'Text Messages Sent/Received with the City': 'Text Messages Sent/Received with the City'
        'Utility Bills': 'Utility Bills'
        'Violation Notices': 'Violation Notices'
      '#other__option_label': 'Other… (Please Describe Below)'
      '#other__title': 'Other Records the City Possesses '
      '#other__description': 'In order to be granted, the law requires you to describe the records needing redaction with specificity. List or describe add'
    request_date_of_birth:
      '#type': date
      '#title': 'Date of Birth'
      '#description': '<p>The date of birth is used to confirm identities in Portland Police systems and is essential for redacting your personal information from those records.</p><p>﻿If you have listed family members in the "<strong>Name of family members whose safety is at risk</strong>" field above, please include their birth dates as well.</p><p>&nbsp;</p>'
      '#states':
        visible:
          - ':input[name="request_which_records[checkboxes][911 Calls]"]':
              checked: true
          - or
          - ':input[name="request_which_records[checkboxes][Police Records]"]':
              checked: true
    markup_property_ownership:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="request_which_records[checkboxes][PortlandMaps]"]':
            checked: true
      '#markup': '<div class="alert alert--info next-steps"><h2 class="mt-0">PortlandMaps Property Ownership is County Data</h2><p class="mb-0">The City of Portland''s PortlandMaps site relies on data owned and maintained by Multnomah County. The City can replace the data on PortlandMaps, but it may still be available elsewhere or be unexpectedly replaced during an update. To complete the exemption of your ownership information at its source you must contact Julia Liberman at</p></div>'
    report_property_id:
      '#type': textfield
      '#title': 'Property ID in PortlandMaps'
      '#description': '<p><em style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">This code can be found in the URL of your residential address in </em><a style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;" href="PortlandMaps " rel="nofollow noreferrer noopener" target="_blank"><em style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);">PortlandMaps</em></a><em style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">. For example: </em><strong style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">R246102</strong><em style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);"><strong style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"> </strong></em><em style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">is your Property ID if your address was 1221 SW 4th Ave: </em><a style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;" href="PortlandMaps " rel="nofollow noreferrer noopener" target="_blank"><https://www.portlandmaps.com/detail/property/1220-SW-5TH-AVE/</a>><a style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 0);box-sizing:border-box;font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;" href="PortlandMaps " rel="nofollow noreferrer noopener" target="_blank">R246102</a><a style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;" href="PortlandMaps " rel="nofollow noreferrer noopener" target="_blank">_did/</a><span style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);color:rgb(95, 103, 134);display:inline !important;float:none;font-family:"Inter var", Arial, Helvetica, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">.</span></p>'
      '#description_display': before
      '#states':
