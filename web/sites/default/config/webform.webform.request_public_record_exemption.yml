          ':input[name="request_which_records[checkboxes][PortlandMaps]"]':
            checked: true
    request_records_more_information:
      '#type': textarea
      '#title': 'Help Us Locate Your Information in City Records'
      '#description': '<p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:;" inter="" var",="" arial,="" helvetica,="" sans-serif,="" "segoe="" ui="" emoji",="" symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin:0px;orphans:2;scrollbar-color:rgb(135,="" 141,="" 171)="" rgba(0,="" 0,="" 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"="">Provide enough information to locate and identify the records selected above. Include as much detail as possible for each selection. Helpful information might include:</p><ul style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(95, 103, 134);font-family:;" inter="" var",="" arial,="" helvetica,="" sans-serif,="" "segoe="" ui="" emoji",="" symbol";font-size:12px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;list-style-position:outside;margin:0px;orphans:2;padding:0.5em="" 0.5em="" 2em;scrollbar-color:rgb(135,="" 141,="" 171)="" rgba(0,="" 0,="" 0);text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"=""><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="e831d13b78b3a9da485ef63411277f7f2">Timeframes, dates, date ranges, approximate year.</li><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="ec13b1d0a80287f21a7595cde6fe82248">Specific types of records, permits, forms submitted.</li><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="efc03e033adda67a5cfbdfa3165d858a5">Names of classes, activities, events.</li><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="e45cd8a7e35b311700f049088325402fa">Employment positions applied for.</li><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="e2cc3680ef9733b988f6491e701a3de29">Bureaus or specific City employees with which you have worked or communicated.</li><li style="box-sizing:border-box;scrollbar-color:rgb(135, 141, 171) rgba(0, 0, 0, 0);" data-list-item-id="e07c49b2c60a8a1310237fc2add9b5290">Subjects or participants of messages or correspondence.</li></ul>'
      '#description_display': before
  request_safety_risk_explanation:
    '#type': webform_section
    '#title': 'Explain How Your Safety is at Risk'
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
    markup_safety_risk_explanation:
      '#type': webform_markup
      '#markup': '<h3>Eligibility for Exemption ORS 192.368</h3><p>To qualify for this exemption, you must provide evidence that disclosure of your home address, personal telephone number, or personal electronic mail address would pose a danger to your personal safety or that of a family member residing with you.</p><p><strong>How to Provide Evidence</strong></p><p>If you have supporting documentary evidence (e.g., police reports, court orders), please attach it below. If you do not have evidence to attach, provide as much detail as possible in your statement, including:</p><ul><li>Specific incidents, such as threats or acts of violence.</li><li>Police report numbers, court orders, or references to criminal/civil proceedings.</li><li>Dates of 911 calls or non-emergency reports.</li><li>Contacts within the City of Portland who can verify your statements.</li></ul><p><strong>Examples of Statements</strong></p><ul><li>"I am a victim of domestic violence and am including related police report numbers."</li><li>"I have a protective/restraining order, temporary restraining order (TRO), or other court order, and can attach evidence."</li><li>"I have a stalker with a history of violence. These are the dates of 911 calls I have made about my situation."</li><li>"I have received direct threats to my life or safety, including the following examples (e.g., threatening messages, confrontations)."</li></ul><p><strong>Details to Include in Your Statement</strong></p><p>Whether or not you have evidence to attach, include relevant details such as:</p><ul><li>Documentation or reference numbers for legal, medical, or public safety records.</li><li>Dates and descriptions of incidents.</li><li>Information about individuals posing a threat (if safe to disclose).</li><li>Specific information about threats that have occurred (location, what was said, etc.)</li></ul>'
    request_safety_risk_write_up:
      '#type': textarea
      '#title': 'Explain how the release of your information could endanger your personal safety.'
    request_attorney_role:
      '#type': textarea
      '#title': 'What is your role as an attorney?'
      '#description': '<p>To qualify for an ORS 192.345(32) exemption you "must be a district attorney, a deputy district attorney, the Attorney General or an assistant attorney general, the United States Attorney for the District of Oregon or an assistant United States attorney for the District of Oregon, a city attorney who engages in the prosecution of criminal matters or a deputy city attorney who engages in the prosecution of criminal matters." (ORS 192.345(32)(b)).</p>'
      '#description_display': before
      '#states':
        visible:
          ':input[name="request_user_type"]':
            value: 'I am a Government Attorney looking to request the city exempt specific personal information from public disclosure'
    request_bar_number:
      '#type': textfield
      '#title': 'Bar Number'
      '#states':
        visible:
          ':input[name="request_user_type"]':
            value: 'I am a Government Attorney looking to request the city exempt specific personal information from public disclosure'
    request_document_upload:
      '#type': webform_document_file
      '#title': 'Attach documentary evidence:'
      '#file_extensions': 'txt pdf doc docx ppt pptx xls xlsx'
  request_full_name:
    '#type': textfield
    '#title': 'Requester Full Name'
    '#access': false
    '#default_value': '[webform_submission:values:contact_first_name] [webform_submission:values:contact_last_name]'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#states':
      invisible:
        ':input[name="request_user_type"]':
          unchecked: true
