  confirmation_message: '<p>Your report has been&nbsp;submitted. &nbsp;</p><p>Please know that some suggestions may not be possible for us to do. All changes must meet engineering standards, and some work may need funding that isn’t always available right away.</p><p>Here is what you can typically expect moving forward: &nbsp;&nbsp;</p><p><strong>Routine requests or past issues</strong>&nbsp;(2 weeks – 2 months):&nbsp;For requests that&nbsp;do not need an engineering study, we will respond to routine requests for information or research historical requests to see if similar issues have already been reported.</p><p><strong>Triaging new requests&nbsp;</strong>(2&nbsp;weeks&nbsp;– 2 months):&nbsp;Our Traffic Safety team will&nbsp;review your request,&nbsp;decide&nbsp;if an engineering&nbsp;study&nbsp;is needed, and&nbsp;let you know the&nbsp;expected&nbsp;timeline. &nbsp;</p><p><strong>Typical engineering study timelines</strong>&nbsp;(approximately 3-12&nbsp;months&nbsp;or more):&nbsp;</p><ul><li data-list-item-id="eb4bc34db96acb291c6fca8a180dca7fa">Requests&nbsp;related to a recent collision involving a person walking or biking, or a car that ran off the road&nbsp;are typically investigated&nbsp;within 2-3 months. &nbsp;</li><li data-list-item-id="e20e47d67f9ebf2b3b01c2f6139333abe">For all other traffic safety requests, we look at needs across the entire city and pay special attention to areas where people may be more at risk. These requests are usually reviewed within 9 to 24 months.</li></ul><p>Because of our workload&nbsp;and&nbsp;priorities, these timelines can vary widely. During an investigation, an engineer may contact you for more&nbsp;information, visit the site, or collect traffic data. &nbsp;</p><p>When the study is complete, an engineer will contact you and let you know next steps.&nbsp;</p><p><strong>Please note:&nbsp;</strong>Even if we can’t act on your request right now, it still helps us understand traffic safety across the city and plan our future work. Thank you!&nbsp;</p><p>We appreciate your patience and your help in keeping Portland neighborhoods safe.</p>'
