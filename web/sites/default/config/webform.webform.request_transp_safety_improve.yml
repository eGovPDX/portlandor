      {% if 'A change to an existing sign' in data.report_sign_improvement_type %}41755046478615_a_change_to_an_existing_sign {% endif %}
      {% if 'Stop signs' in data.report_sign_improvement %}41755046478615_stop_signs {% endif %}
      {% if 'Street name' in data.report_sign_improvement %}41755046478615_street_name {% endif %}
      {% if 'No turn on red' in data.report_sign_improvement %}41755046478615_no_turn_on_red {% endif %}
      {% if 'Speed limit' in data.report_sign_improvement %}41755046478615_speed_limit {% endif %}
      {% if 'Parking or no parking signs' in data.report_sign_improvement %}41755046478615_parking_or_no_parking_signs {% endif %}
      {% if 'School zone' in data.report_sign_improvement %}41755046478615_school_zone {% endif %}
