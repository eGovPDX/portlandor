        - authenticated
      '#employee_notes_panel__access': false
      '#escalate_issue__access': false
      '#test_submission__access': false
  computed_subject:
    '#type': webform_computed_twig
    '#title': 'Computed Subject'
    '#display_on': none
    '#template': "{{ data.report_location.location_address|upper|replace({'&': 'AND'}) }}"
  computed_tags:
    '#type': webform_computed_twig
    '#title': 'Computed tags'
    '#display_on': none
    '#mode': text
    '#template': |-
      {# -------- Computed routing -------- #}
      {% set pri = "" %}
      {% set matrix = data.report_location.location_region_id %}

      {# *** Priority M short circuits all other priority settings *** #}
      {% if data.report_is_transportation_agency == "Yes" and 
           (data.report_who_are_you == "PBOT Maintenance" or data.report_who_are_you == "Utility" or data.report_who_are_you == "PBOT Data Collection") %}
            {% set pri = "M" %}
            38868731455511_m
            38008128296599_study_needs_assignment
            debug_01

      {# if Transportation agency (non-City), always set pri B/C based on matrix #}
      {% elseif data.report_is_transportation_agency == "Yes" and data.report_who_are_you == "Transportation agency (non-City)" %}
          {% if matrix == "4" or matrix == "5" %}
            {% set pri = "B" %}
            38868731455511_b
          {% elseif matrix == "1" or matrix == "2" or matrix == "3" %}
            {% set pri = "C" %}
            38868731455511_c
          {% endif %}
            
      {% elseif data.report_crash_related == "Yes" %}
        {# Related to collision #}
        {% if data.report_crash_involvement_type == "Involving a pedestrian or a bicyclist" or data.report_crash_involvement_type == "A vehicle ran off the roadway during the crash" %}
          {% set pri = "A" %}
          38868731455511_a
          38008128296599_study_needs_assignment
        
        {% elseif data.report_crash_involvement_type == "Involving two or more vehicles" %}
          {% if matrix == "4" or matrix == "5" %}
            {% set pri = "B" %}
            38868731455511_b
          
          {% elseif matrix == "1" or matrix == "2" or matrix == "3" %}
            {% set pri = "C" %}
            38868731455511_c
            
          {% endif %}
            
        {% endif %}

      {% elseif (data.report_crash_related == "No" or data.report_crash_related == "It was a near miss") and (matrix == "4" or matrix == "5") %}
        {% set pri = "B" %}
        38868731455511_b

      {% elseif (data.report_crash_related == "No" or data.report_crash_related == "It was a near miss") and (matrix == "1" or matrix == "2" or matrix == "3") %}
        {% set pri = "C" %}
        38868731455511_c
        
      {% elseif data.report_crash_related == "Yes" and data.report_crash_involvement_type == "Involving two or more vehicles" and (matrix == "4" or matrix == "5") %}
        {% set pri = "B" %}
        38868731455511_b

      {% elseif data.report_crash_related == "Yes" and data.report_crash_involvement_type == "Involving two or more vehicles" and (matrix == "1" or matrix == "2" or matrix == "3") %}
        {% set pri = "C" %}
        38868731455511_c
        
      {# Partner agency: PBOT MO, Data Collection, or Utility #}
      {% elseif data.report_who_are_you == "PBOT Data Collection" or data.report_who_are_you == "PBOT Maintenance" or data.report_who_are_you == "Utility" %}
        {% set pri = "M" %}
        38868731455511_m
        38008128296599_study_needs_assignment
        debug_02

      {# Internal: ADA request #}
      {% elseif data.report_staff_internal_options == "ADA request" %}
        {% set pri = "A" %}
        38868731455511_a
        38008128296599_study_needs_assignment
        debug_03

      {# Internal: Legal claim #}
      {% elseif data.report_staff_internal_options == "Legal or risk claim" %}
        {% set pri = "" %}
        38008128296599_documentation_open

      {# Crosswalk closure #}
      {% elseif data.report_staff_internal_options == "Crosswalk closure" %}
        {% set pri = "" %}
        38008128296599_documentation_closed

      {# Signal approval #}
      {% elseif data.report_staff_internal_options == "Signal approval" %}
        {% set pri = "" %}
        38008128296599_documentation_closed

      {# Public records request #}
      {% elseif data.report_staff_internal_options == "Public records request" %}
        {% set pri = "" %}
        38008128296599_documentation_open

      {# Illegal or unpermitted installation #}
      {% elseif 'An illegal or unpermitted installation' in data.report_describe_the_issue %}
        {% set pri = "" %}
        38008128296599_study_needs_assignment
        debug_04

      {# Matrix is 4-5 and not pri A or M #}
      {% elseif (matrix == "4" or matrix == "5") and pri != "A" and pri != "M" %}
        {% set pri = "B" %}
        38868731455511_b
        38008128296599_study_needs_assignment
        debug_05

      {# Matrix anything other than 4 or 5 #}
      {% elseif matrix == "1" or matrix == "2" or matrix == "3" %}
        {% set pri = "C" %}
        38868731455511_c
        38008128296599_na
        ddebug_06
        
      {% endif %}



      {# ---------- Household Matrix ----------- #}
      {% if matrix == "1" %}household_matrix_1 {% elseif matrix == "2" %}household_matrix_2 {% elseif matrix == "3" %}household_matrix_3 {% elseif matrix == "4" %}household_matrix_4 {% elseif matrix == "5" %}household_matrix_5 {% endif %}


      {# ---------- Misc tags ------------ #}
      {% if data.report_parking_changes is not iterable and data.report_parking_changes == "Curbside parking and loading" %}traffic_safety_auto_refer_parking {% endif %}

      {% if data.report_school_zone_improvement and data.report_school_zone_improvement is not iterable and data.report_school_zone_improvement != '_other_' %}traffic_safety_auto_refer_SRTS {% endif %}

      {% if 'Streetlight improvements' in data.report_ideal_solution %}traffic_safety_auto_refer_SSL {% endif %}

      {% if 'Traffic enforcement' in data.report_ideal_solution %}traffic_safety_auto_refer_PPB {% endif %}

      {% if data.contact_follow_up %}follow_up_requested {% endif %}


      {# ---------- Request area ----------- #}
      {% if 'Bicycle safety' in data.report_describe_the_issue %}40340559180183_bicycle_safety {% endif %}
      {% if 'Intersection safety' in data.report_describe_the_issue %}40340559180183_intersection_safety {% endif %}
      {% if 'Parking' in data.report_describe_the_issue %}40340559180183_parking {% endif %}
      {% if 'Pedestrian safety' in data.report_describe_the_issue %}40340559180183_pedestrian_safety {% endif %}
      {% if 'Public transit improvements' in data.report_describe_the_issue %}40340559180183_public_transit_improvements {% endif %}
      {% if 'School safety' in data.report_describe_the_issue %}40340559180183_school_safety {% endif %}
      {% if 'Speeding or dangerous driving' in data.report_describe_the_issue %}40340559180183_speeding_or_dangerous_driving {% endif %}
      {% if 'Visibility' in data.report_describe_the_issue %}40340559180183_visibility {% endif %}
      {% if 'An illegal or unpermitted installation' in data.report_describe_the_issue %}40340559180183_an_illegal_or_unpermitted_installation {% endif %}
      {% if 'Railroad Assets' in data.report_describe_the_issue %}40340559180183_railroad_crossing_changes {% endif %}
      {% if 'Other...' in data.report_describe_the_issue %}40340559180183_other {% endif %}

      {# ---------- Suggested improvements -----------#}

      {% if 'Bike route improvements' in data.report_ideal_solution %}40340737233559_bike_route_improvements {% endif %}
      {% if 'Bike crossing improvements' in data.report_bike_route_improvement %}41755046478615_bike_crossing_improvements {% endif %}
      {% if 'Bike parking' in data.report_bike_route_improvement %}41755046478615_bike_parking {% endif %}
      {% if 'Bicyclist wayfinding signs' in data.report_bike_route_improvement %}41755046478615_bicyclist_wayfinding_signs {% endif %}
      {% if 'New bike lane or bike route' in data.report_bike_route_improvement %}41755046478615_new_bike_lane_or_bike_route {% endif %}
      {% if 'Bike lane protections' in data.report_bike_route_improvement %}41755046478615_bike_lane_protections {% endif %}
      {% if 'Right-turn pocket' in data.report_bike_route_improvement %}41755046478615_right_turn_pocket {% endif %}
      {% if 'Bike box improvements' in data.report_bike_route_improvement %}41755046478615_bike_box_improvements {% endif %}
      {% if 'Other...' in data.report_bike_route_improvement %}41755046478615_other {% endif %}

      {% if 'Crosswalk improvements' in data.report_ideal_solution %}40340737233559_crosswalk_improvements {% endif %}
      {% if 'New marked crosswalk' in data.report_crosswalk_improvement %}41755046478615_new_marked_crosswalk {% endif %}
      {% if 'Improvements to existing marked crosswalk (signals, pavement markings, signage, crossing buttons)' in data.report_crosswalk_improvement %}41755046478615_improvements_to_existing_marked_crosswalk {% endif %}
      {% if 'Other...' in data.report_crosswalk_improvement %}41755046478615_other {% endif %}

      {% if 'Parking changes' in data.report_ideal_solution %}40340737233559_parking_changes {% endif %}
      {% if 'Parking removal' in data.report_parking_changes %}41755046478615_parking_removal {% endif %}
      {% if 'Curbside parking and loading' in data.report_parking_changes %}41755046478615_curbside_parking_and_loading {% endif %}
      {% if 'Other...' in data.report_parking_changes %}41755046478615_other {% endif %}

      {% if 'Pavement marking improvements' in data.report_ideal_solution %}40340737233559_pavement_marking_improvements {% endif %}
      {% if 'Bike lane or greenway' in data.report_pavement_marking_improvement %}41755046478615_bike_lane_or_greenway {% endif %}
      {% if 'Crosswalk or intersection' in data.report_pavement_marking_improvement %}41755046478615_crosswalk_or_intersection {% endif %}
      {% if 'Travel lane lines (yellow or white)' in data.report_pavement_marking_improvement %}41755046478615_travel_lane_lines {% endif %}
      {% if 'Parking lines or markings' in data.report_pavement_marking_improvement %}41755046478615_parking_lines_or_markings {% endif %}
      {% if 'Other...' in data.report_pavement_marking_improvement %}41755046478615_other {% endif %}

      {% if 'School zone improvements (traffic-flow/circulation)' in data.report_ideal_solution %}40340737233559_school_zone_improvements__traffic {% endif %}
      {% if 'Drop-off/pick-up circulation' in data.report_school_zone_improvement %}41755046478615_drop_off_pick_up_circulation {% endif %}
      {% if 'School loading zones' in data.report_school_zone_improvement %}41755046478615_school_loading_zones {% endif %}
      {% if 'School bus zones' in data.report_school_zone_improvement %}41755046478615_school_bus_zones {% endif %}
