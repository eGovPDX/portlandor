uuid: 408ad3d7-5275-43c7-9e3d-641cef9c0be4
langcode: en
status: open
dependencies:
  module:
    - portland
    - portland_zendesk
third_party_settings:
  portland:
    disable_demographic_form_prompt: 0
    exclude_from_json: {  }
weight: 0
open: null
close: null
uid: 60
template: false
archive: false
id: request_transp_safety_improve
title: 'Request Transportation Safety Improvement (823-SAFE)'
description: ''
categories: {  }
elements: |-
  page_understanding_your_request:
    '#type': webform_wizard_page
    '#title': 'Understanding your request'
    report_staff_use_type:
      '#type': radios
      '#title': 'Which of these best fits your use of this form?'
      '#prepopulate': true
      '#options':
        city_staff: 'I am a 311 CSR or City staff member assisting a community member with intake'
        safety_staff: 'I am a Traffic Safety staff person entering an internal request'
      '#required': true
      '#access_create_roles':
        - authenticated
    report_request_type:
      '#type': radios
      '#title': 'What would you like to request?'
      '#prepopulate': true
      '#options':
        'Removal of something that is blocking a street or sidewalk or causing an obstruction': 'Removal of something that is blocking a street or sidewalk or causing an obstruction'
        'Removal of an ADA barrier or another type of ADA Accommodation': 'Removal of an ADA barrier or another type of ADA Accommodation'
        street_improvement: 'A change or improvement to a street to address a traffic safety concern'
      '#required': true
      '#states':
        visible:
          ':input[name="report_staff_use_type"]':
            value: city_staff
    markup_jump_pbot_mo:
      '#type': webform_markup
      '#markup': '<div class="alert alert--info next-steps"><h2>Next Steps</h2><p>Please use the <a href="/">This Form</a></p></div>'
      '#access': false
    markup_jump_row_obstruction:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="report_request_type"]':
            value: 'Removal of something that is blocking a street or sidewalk or causing an obstruction'
      '#markup': '<div class="alert alert--info next-steps"><h2>Next Steps</h2><p>Please <a href="/form/report-row-obstruction">report an obstruction in the right of way</a></p></div>'
    markup_jump_ada:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="report_request_type"]':
            value: 'Removal of an ADA barrier or another type of ADA Accommodation'
      '#markup': '<div class="alert alert--info next-steps"><h2>Next Steps</h2><p>Please <a href="/311/ada-request">request an A.D.A. accommodation</a></p></div>'
    report_staff_internal_options:
      '#type': radios
      '#title': 'What type of internal request?'
      '#options':
        'Legal or risk claim': 'Legal or risk claim'
        'ADA request': 'ADA request'
        'Crosswalk closure': 'Crosswalk closure'
        'Signal approval': 'Signal approval'
        'Public records request': 'Public records request'
      '#states':
        visible:
          ':input[name="report_staff_use_type"]':
            value: safety_staff
      '#required': true
    report_is_transportation_agency:
      '#type': radios
      '#title': 'Are you making this request on behalf of a transportation, utility, or other partner agency?'
      '#prepopulate': true
      '#options': yes_no
      '#required': true
      '#states':
        visible:
          ':input[name="report_request_type"]':
            value: street_improvement
    report_who_are_you:
      '#type': webform_radios_other
      '#title': 'Which of the following best describes you?'
      '#options':
        'PBOT Data Collection': 'PBOT Data Collection'
        'PBOT Maintenance': 'PBOT Maintenance'
        'Other City employee': 'Other City employee'
        'Transportation agency (non-City)': 'Transportation agency (non-City)'
        Utility: Utility
      '#other__option_label': 'Other agency...'
      '#other__placeholder': 'Name of agency...'
      '#required': true
      '#states':
        visible:
          ':input[name="report_is_transportation_agency"]':
            value: 'Yes'
    report_location:
      '#type': portland_location_picker
      '#title': 'Location of issue'
      '#required': true
      '#states':
        visible:
          - ':input[name="report_is_transportation_agency"]':
              checked: true
          - or
          - ':input[name="report_staff_use_type"]':
              value: safety_staff
      '#location_lat__required': true
      '#place_name__access': false
      '#location_details__description': 'Please provide any other details that might help us understand where your concern is (e.g. the northeast corner, in the left lane, driving east on..., on the south sidewalk etc.)'
      '#location_type__access': false
      '#location_park_container__access': false
      '#location_private_owner__access': false
      '#out_of_bounds_message': "This location is outside the City of Portland's city limits. Please report your concern to the local jurisdiction. You can call 311 or email 311@portlandoregon.gov if you need help determining who to contact."
      '#require_boundary': true
      '#click_query_url': 'https://www.portlandmaps.com/arcgis/rest/services/Public/PBOT_Planning/MapServer/36/query?geometry={{x}}%2C{{y}}&geometryType=esriGeometryPoint&outFields=IncomeIndexScore&f=json'
      '#click_query_property_path': 'features[0].attributes.IncomeIndexScore'
      '#click_query_destination_field': location_region_id
    markup_01:
      '#type': webform_markup
      '#access_create_roles':
        - anonymous
      '#markup': '<div class="alert alert--warning next-steps"><h2>Important</h2><p><strong>City of Portland staff, please log in to use this form. </strong>You may use the "Editor log in" link in the page footer below.</p></div>'
    actions:
      '#type': webform_actions
      '#title': 'Submit button(s)'
      '#states':
        invisible:
          - ':input[name="report_request_type"]':
              value: 'Removal of something that is blocking a street or sidewalk or causing an obstruction'
          - or
          - ':input[name="report_request_type"]':
              value: 'Removal of an ADA barrier or another type of ADA Accommodation'
    computed_household_matrix:
      '#type': webform_computed_twig
      '#title': 'Household Matrix'
      '#wrapper_attributes':
        class:
          - d-none
      '#mode': text
      '#template': '{{ data.report_location.location_region_id }}'
      '#whitespace': trim
  page_issue_details:
    '#type': webform_wizard_page
    '#title': 'Request details'
    container_describe_issue:
      '#type': container
      '#states':
        visible:
          ':input[name="report_request_type"]':
            value: street_improvement
      report_describe_the_issue:
        '#type': checkboxes
        '#title': 'Select a request area'
        '#multiple': 3
        '#description': '<p>Please limit the number of selections below to 3 or less.</p>'
        '#description_display': before
        '#options':
          'Bicycle safety': 'Bicycle safety'
          'Intersection safety': 'Intersection safety'
          Parking: Parking
          'Pedestrian safety': 'Pedestrian safety'
          'Public transit improvements': 'Public transit improvements'
          'School safety': 'School safety'
          'Speeding or dangerous driving': 'Speeding or dangerous driving'
          Visibility: Visibility
          'An illegal or unpermitted installation': 'An illegal or unpermitted installation'
          'Railroad Assets': 'Railroad crossing changes'
          Other...: Other...
      report_describe_the_issue_other:
        '#type': textfield
        '#title': 'Please describe "other"'
        '#title_display': invisible
        '#states':
          visible:
            ':input[name="report_describe_the_issue[Other...]"]':
              checked: true
    report_additional_details:
      '#type': textarea
      '#title': 'Additional details about your request'
      '#description': '<p>Please tell us what is happening, where it happens, and when it usually happens. If you can, include a general time when we might be able to observe the issue.</p><p>Example: “When I bike west on SE Clinton Street in the morning, drivers going south don’t stop at the stop sign.”</p>'
      '#description_display': before
    section_crash_related:
      '#type': webform_section
      '#title': 'Crash related'
      '#title_display': invisible
      '#states':
        invisible:
          ':input[name="report_staff_use_type"]':
            value: safety_staff
      report_crash_related:
        '#type': radios
        '#title': 'Is this request related to a crash?'
        '#description': '<p>Please only answer "Yes" or "Near miss" if the incident happened within the past year or if you were involved in or a witness to the crash.</p>'
        '#description_display': before
        '#options':
          'Yes': 'Yes'
          'No': 'No'
          'It was a near miss': 'It was a near miss'
        '#required': true
      report_crash_involvement_type:
        '#type': radios
        '#title': 'Please select the option below that best describes the type of crash'
        '#options':
          'Involving two or more vehicles': 'Involving two or more vehicles'
          'Involving a pedestrian or a bicyclist': 'Involving a pedestrian or a bicyclist'
          'A vehicle ran off the roadway during the crash': 'A vehicle ran off the roadway during the crash'
        '#required': true
        '#states':
          visible:
            ':input[name="report_crash_related"]':
              value: 'Yes'
      report_involved_in_crash:
        '#type': webform_radios_other
        '#title': 'Were you:'
        '#options':
          'Involved in the crash': 'Involved in the crash'
          'A witness to the crash': 'A witness to the crash'
        '#other__option_label': Neither
        '#other__placeholder': 'Please explain briefly'
        '#states':
          visible:
            ':input[name="report_crash_related"]':
              value: 'Yes'
      report_date_time_of_incident:
        '#type': datetime
        '#title': 'Date and time of incident'
        '#states':
          visible:
            ':input[name="report_crash_related"]':
              value: 'Yes'
        '#date_time_step': '60'
      request_crash_details:
        '#type': textarea
        '#title': 'Additional details about the crash'
        '#states':
          visible:
            - ':input[name="report_crash_related"]':
                value: 'Yes'
            - or
            - ':input[name="report_crash_related"]':
                value: 'It was a near miss'
    report_photo_upload:
      '#type': managed_file
      '#title': 'Photo Upload'
      '#multiple': 5
      '#description': '<p>If you want to share file types that are not listed below, please reply to the confirmation email you will receive after submitting this form.</p>'
      '#description_display': before
      '#access_create_roles':
        - anonymous
      '#file_extensions': 'pdf jpg jpeg png'
    report_photo_upload_2:
      '#type': managed_file
      '#title': 'Photo Upload'
      '#multiple': 5
      '#access_create_roles':
        - authenticated
      '#file_extensions': 'pdf jpg jpeg png msg doc'
  page_ideal_solution:
    '#type': webform_wizard_page
    '#title': 'Suggested improvement'
    '#states':
      invisible:
        ':input[name="report_staff_use_type"]':
          value: safety_staff
    computed_request_area:
      '#type': webform_computed_twig
      '#title': 'Computed Request Area'
      '#title_display': invisible
      '#display_on': form
      '#template': |-
        {% if data.report_describe_the_issue and data.report_describe_the_issue is iterable %}
          <strong>Your requested safety areas:</strong>
          <ul>
            {% for key, item in data.report_describe_the_issue %}
              {# Ignore the structural '_other_' key, only print valid string options #}
              {% if item is not iterable and item is not empty %}
                <li>{{ item }}{% if item == "Other..." %}{{ data.report_describe_the_issue_other }}{% endif %}</li>
              {% endif %}
            {% endfor %}
          </ul>
        {% endif %}
      '#ajax': true
    container_proposed_solution:
      '#type': container
      markup_02:
        '#type': webform_markup
        '#markup': '<div class="alert alert--info next-steps"><h2>Information</h2><p>Some suggestions may not be possible. All changes must meet engineering standards, and some may need funding that isn''t available right away. Even if we can''t move forward with your request, your feedback helps us understand safety concerns across the city and helps us plan future improvements.</p></div>'
      report_ideal_solution:
        '#type': checkboxes
        '#title': 'Do you have a suggested improvement?'
        '#multiple': 3
        '#description': '<p>Please limit the number of selections below to 3 or less.</p>'
        '#description_display': before
        '#options':
          'Bike route improvements': 'Bike route improvements'
          'Crosswalk improvements': 'Crosswalk improvements'
          'Parking changes': 'Parking changes'
          'Pavement marking improvements': 'Pavement marking improvements'
          'School zone improvements (traffic-flow/circulation)': 'School zone improvements (traffic-flow/circulation)'
          'Sidewalk installation': 'Sidewalk installation'
          Signs: Signs
          'Speed bumps or speed limit reduction': 'Speed bumps or speed limit reduction'
          'Streetlight improvements': 'Streetlight improvements'
          'Traffic congestion improvements': 'Traffic congestion improvements'
          'Traffic enforcement': 'Traffic enforcement'
          'Traffic or crossing signal improvements': 'Traffic or crossing signal improvements'
          'Truck restrictions': 'Truck restrictions'
          'Unimproved roadway or gravel street improvements': 'Unimproved roadway or gravel street improvements'
          'General evaluation or something else': 'General evaluation or something else -- <em>Please describe below...</em>'
        '#other__option_label': 'General evaluation or something else'
        '#other__placeholder': 'Please describe'
    section_improvement_specifics:
      '#type': webform_section
      '#title': 'Improvement Specifics'
      '#title_display': invisible
      report_bike_route_improvement:
        '#type': radios
        '#title': 'What kind of bike route improvement?'
        '#options':
          'Bike crossing improvements': 'Bike crossing improvements -- Signals, green pavement markings, signage, crossing buttons'
          'Bike parking': 'Bike parking'
          'Bicyclist wayfinding signs': 'Bicyclist wayfinding signs'
          'New bike lane or bike route': 'New bike lane or bike route -- Pavement markings for bike lanes or neighborhood greenways including white lines, green areas, and shared-lane symbols'
          'Bike lane protections': 'Bike lane protections -- Concrete separators, parking protected bike lane, or other treatments to prevent cars entering the bike lane'
          'Right-turn pocket': 'Right-turn pocket -- Dedicated area for bicyclists making a right turn'
          'Bike box improvements': 'Bike box improvements -- Dedicated area for bicyclists at traffic signals'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Bike route improvements]"]':
              checked: true
      markup_next_steps_bike_parking:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_bike_route_improvement[radios]"]':
              value: 'Bike parking'
        '#markup': '<div class="alert alert--info next-steps"><h2>Information</h2><p>If you would like PBOT to install bike racks on the sidewalk in front of your business, please confirm with your property owner or manager first, then gather your contact information and the location where you’d like the racks placed.</p><p>When you''re ready, <a href="/transportation/walking-biking-transit-safety/apply-install-bike-racks-sidewalk">submit a bike rack request application</a>. The form takes about 5–10 minutes to complete.</p></div>'
      report_crosswalk_improvement:
        '#type': radios
        '#title': 'What kind of crosswalk improvement?'
        '#options':
          'New marked crosswalk': 'New marked crosswalk'
          'Improvements to existing marked crosswalk (signals, pavement markings, signage, crossing buttons)': 'Improvements to existing marked crosswalk (signals, pavement markings, signage, crossing buttons)'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Crosswalk improvements]"]':
              checked: true
      report_parking_changes:
        '#type': radios
        '#title': 'What kind of parking changes'
        '#options':
          'Parking removal': 'Parking removal -- For issues with turning or visibility issues.'
          'Curbside parking and loading': 'Curbside parking and loading -- For issues with loading zones, ADA parking, or time‑limited parking'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Parking changes]"]':
              checked: true
      markup_parking_curb_zone:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_parking_changes[radios]"]':
              value: 'Curbside parking and loading'
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>Because you selected "Curbside parking and loading," we want to make sure you’re headed to the right place. Some curb‑use changes require different permits or programs.&nbsp;</p><p>If you are trying to use part of the street or sidewalk for a project or task, please see <a href="/transportation/permitting/temporary-street-use-permitting-tsup">Temporary Street Use Permitting</a>.&nbsp;</p><p>If you are looking to add new signs or change existing signs for parking or loading in a specific curb area, you may want one of these options instead:&nbsp;</p><ul><li data-list-item-id="e5243884f9ba5218b0c01131696ec16b1"><a href="/transportation/parking/faststop">FAST STOP 5‑Minute Parking Zones</a></li><li data-list-item-id="e0aba1a96dff099c087bc883525f9dc09"><a href="/transportation/parking/miscellaneous-parking-permit">Apply for an annual Miscellaneous Parking Permit for businesses, nonprofits, and media</a></li></ul><p>If you would still like to submit a request for our Traffic Safety team to review, please continue filling out this form. Your request may lead to a traffic safety investigation of the area you’re concerned about.&nbsp;</p></div>'
      report_pavement_marking_improvement:
        '#type': radios
        '#title': 'What kind of pavement marking improvement?'
        '#options':
          'Bike lane or greenway': 'Bike lane or greenway'
          'Crosswalk or intersection': 'Crosswalk or intersection'
          'Travel lane lines (yellow or white)': 'Travel lane lines (yellow or white)'
          'Parking lines or markings': 'Parking lines or markings'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Pavement marking improvements]"]':
              checked: true
      report_sign_improvement_type:
        '#type': radios
        '#title': 'What kind of sign improvement?'
        '#options':
          'A new sign': 'A new sign'
          'A change to an existing sign': 'A change to an existing sign'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Signs]"]':
              checked: true
      report_sign_improvement:
        '#type': radios
        '#title': 'What kind of sign?'
        '#options':
          'Stop signs': 'Stop signs'
          'Street name': 'Street name'
          'No turn on red': 'No turn on red'
          'Speed limit': 'Speed limit'
          'Parking or no parking signs': 'Parking or no parking signs'
          'School zone': 'School zone'
          'Directional or wayfinding signage': 'Directional or wayfinding signage'
          'Railroad crossing warning': 'Railroad crossing warning'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Signs]"]':
              checked: true
      markup_traffic_enforcement:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_ideal_solution[Traffic enforcement]"]':
              checked: true
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>Speed and traffic enforcement cameras are not placed based on requests. They are installed based on crash data and whether the location is suitable. To learn more, please visit the <a href="/transportation/vision-zero/safety-cameras">Speed and intersection safety cameras webpage</a>.</p><p>PBOT does not decide or manage traffic enforcement. Because the Police Traffic Division has limited hours, we also recommend contacting <a href="/police/divisions/precincts">your local police precinct</a> to share your concerns.</p><p>PBOT’s Vision Zero program offers free yard signs to encourage safe driving. If you are interested, you can find more information on the <a href="/transportation/vision-zero/yard-signs">Vision Zero webpage</a>.</p></div>'
      report_signal_improvement:
        '#type': radios
        '#title': 'What kind of signal improvement?'
        '#options':
          'A new traffic signal (a.k.a. traffic light)': 'A new traffic signal (a.k.a. traffic light)'
          'Changes to traffic signal timing': 'Changes to traffic signal timing'
          'New pedestrian crossing signal': 'New pedestrian crossing signal'
          'Changes to pedestrian crossing timing': 'Changes to pedestrian crossing timing'
          'Protected turn signal': 'Protected turn signal'
          'Pedestrian head start (a.k.a. Leading Pedestrian Interval)': 'Pedestrian head start (a.k.a. Leading Pedestrian Interval) -- <em>Gives pedestrians a “head start” by showing a walk signal a few seconds before a green light.</em>'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[Traffic or crossing signal improvements]"]':
              checked: true
      report_school_zone_improvement:
        '#type': radios
        '#title': 'What type of school zone improvement?'
        '#options':
          'Drop-off/pick-up circulation': 'Drop-off/pick-up circulation'
          'School loading zones': 'School loading zones'
          'School bus zones': 'School bus zones'
          'Turn restrictions or one-way signage near a school': 'Turn restrictions or one-way signage near a school'
          Other...: 'Other... -- <em>Please describe below...</em>'
        '#states':
          visible:
            ':input[name="report_ideal_solution[School zone improvements (traffic-flow/circulation)]"]':
              checked: true
      markup_info_sidewalk_installation:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_ideal_solution[Sidewalk installation]"]':
              checked: true
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>Sidewalks are usually built through larger city capital projects rather than individual requests. The city uses <a href="/transportation/planning/pedpdx">PedPDX</a>, Portland''s pedestrian plan, to decide where new sidewalks and crossings are most needed. This process looks at factors like <a href="/transportation/news/2019/4/23/news-blog-how-does-pedpdx-decide-where-we-build-sidewalks-and-mark">safety, access to transit, and how many people would benefit</a>.</p><p>Your request will be noted and added to the citywide list of pedestrian needs. You may not receive a direct response, but your input helps shape future planning and can influence where sidewalk projects are prioritized next.</p></div>'
      markup_info_speed_bumps:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_ideal_solution[Speed bumps or speed limit reduction]"]':
              checked: true
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>Most traffic calming features, like speed bumps or curb extensions, are usually added as part of larger city projects. Your request will be added to our list of safety concerns, and while you may not get a direct response, your input helps us decide where improvements are needed most.</p><p>These types of changes are often built through programs like <a href="/transportation/what-are-neighborhood-greenways">Neighborhood Greenways</a>, <a href="/transportation/walking-biking-transit-safety/safe-routes">Safe Routes to School</a>, and <a href="/transportation/fixing-our-streets">Fixing Our Streets</a>. These projects are planned years ahead and are chosen based on things like traffic speed, traffic volume, and important routes for students walking or biking to school.</p></div>'
      markup_info_streetlight_improvements:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_ideal_solution[Streetlight improvements]"]':
              checked: true
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>PBOT prioritizes lighting upgrades based on completed citywide LED conversions, planned safety projects, equity analysis, development requirements, and ongoing engineering evaluations such as monthly nighttime assessments.</p><p>If you are a person living with a disability, or you are submitting this request on behalf of someone with a disability, please use our Request an Accommodation form instead. If your request is not related to an ADA concern, please continue with this form. We will send your request to the correct team, and it will be added to a waitlist and reviewed by an engineer as funding allows.</p></div>'
      markup_gravel_street:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_ideal_solution[Unimproved roadway or gravel street improvements]"]':
              checked: true
        '#markup': '<div class="webform-alert alert alert--info"><h2>Information</h2><p>The City of Portland fills ruts and holes then regrades gravel streets once every three years. Learn more about the <a href="/transportation/maintenance/portland-gravel-street-service">Gravel Street Service</a>.</p></div>'
      report_additional_details_about_idea:
        '#type': textarea
        '#title': 'Additional details about your suggested improvement'
        '#states':
          visible:
            - ':input[name="report_ideal_solution[Bike route improvements]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Crosswalk improvements]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Parking changes]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Pavement marking improvements]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[School zone improvements (traffic-flow/circulation)]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Sidewalk installation]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Signs]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Speed bumps or speed limit reduction]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Streetlight improvements]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Traffic congestion improvements]"]':
                checked: true
            - or
            - ':input[name="report_ideal_solution[Traffic enforcement]"]':
                checked: true
            - or
