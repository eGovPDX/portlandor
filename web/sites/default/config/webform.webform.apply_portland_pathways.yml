  apply_file_upload:
    '#type': webform_image_file
    '#title': 'Route image'
    '#description': '<p>Please provide a screenshot of the location from the <a href="https://experience.arcgis.com/experience/f1e9def1433c465687d0a906d0e84944/?draft=true&amp;org=PDX">Adopted Routes on PedPDX and SW Trails Plan</a>.</p>'
    '#description_display': before
    '#file_preview': 'medium:image'
    '#max_filesize': '30'
    '#file_extensions': 'jpg jpeg png'
    '#sanitize': true
    '#max_resolution': 1280x1280
    '#attachment_image_style': webform_report_uploaded_image
    '#required': true
