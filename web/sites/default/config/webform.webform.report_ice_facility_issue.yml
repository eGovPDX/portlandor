  confirmation_message: '<p>Thank you for submitting this report. While the City does not oversee federal operations, we are committed to ensuring that all people are heard and that everyone''s rights are respected and protected. Visit <a href="/federal">Portland.gov/federal</a> to learn more about how Portland is standing up for our community while we work with our federal partners.</p><p>Your report will be documented and shared with the appropriate city staff. We will respond if we need additional information.</p><p>Your report does not initiate a formal investigation into federal officers. To do that, <a href="https://www.dhs.gov/file-a-civil-rights-complaint">file a complaint with the DHS Office of Civil Rights and Civil Liberties</a> or consult an attorney.&nbsp;</p>'
