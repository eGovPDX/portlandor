id: test_location_widget_required_fi
title: 'Test Location Widget - required field regression testing'
description: '<p>Tests the following use cases:</p><ul><li data-list-item-id="e0701e18eda950b9a9a980e404e534d33">Multiple widgets on a page</li><li data-list-item-id="e661246a451a03f826633e010ec5d74a2">City limits geofencing</li><li data-list-item-id="ea4f2ef3cf864f5341389462362a6bca3">Asset-only selection</li><li data-list-item-id="e3f22f896e7a9c94ee0de17d850ea86d4">Open requests display</li><li data-list-item-id="e6f70429e05f254bf491fe1292ed9aaac">Widget hidden by default and exposed using conditional logic</li><li data-list-item-id="ed6804c967af9404212e8e532dd27a182">Widget in container that''s hidden by default and exposed using conditional logic</li></ul><p>Verify:</p><ul><li data-list-item-id="e1c9536c4c75220f7653be6017dc1071f">Required location validation</li></ul>'
categories:
  - Test
elements: |-
  page_1:
    '#type': webform_wizard_page
    '#title': 'Page 1'
    markup:
      '#type': webform_markup
      '#markup': '<h2><strong>Test Widget 1</strong></h2><p><strong>Configuration</strong></p><ul><li data-list-item-id="edac637af575ec44e07ba2c5a533c8547">Location required</li><li data-list-item-id="e90d55de91602e6eaf4c9819dd93315fe">City limits geofencing enabled</li></ul><p><strong>Testing</strong></p><ul><li data-list-item-id="eca8822ea9c87c2519048b9c6ab56fa36">Submit page without selecting a location<ul><li data-list-item-id="e3e608c9fc591a79a078c17bb972eafcb">Verify validation prevents form from advancing</li></ul></li><li data-list-item-id="e2e8988dfff91b13ef8ee2cbfe6076ca6">Select a location outside the city limits<ul><li data-list-item-id="edb837b75003f6419d4cd3a4fc4f619ea">Verify the out-of-boundary error is displayed</li></ul></li><li data-list-item-id="e101037b0ea3e96ea227aebe85fdb991a">Select a location; submit page<ul><li data-list-item-id="ea09a3461731d73a37ae57f3ba67b7f45">Verify form advances to next page</li></ul></li></ul>'
    location_1:
      '#type': portland_location_picker
      '#title': 'Location 1'
      '#description': '<ul><li data-list-item-id="e69a333af497a9844c66fc09f722a809f">Default settings</li><li data-list-item-id="e95ecdd87bdada7b0ece5051b206a2f41">Location required</li></ul>'
      '#required': true
  page_2:
    '#type': webform_wizard_page
    '#title': 'Page 2'
    markup_01:
      '#type': webform_markup
      '#markup': '<p><strong>Configuration</strong></p><ul><li data-list-item-id="e1a6735be3efc8372d551fee47aa760fe">Location required</li><li data-list-item-id="eb038552ed1189f4c461747c55f3bb8b8">Asset-only selection</li><li data-list-item-id="e5b8cbd5d91b33033e449683686cbacb0">Hidden by default and exposed using conditional logic (check the box)</li></ul><p><strong>Testing</strong></p><ul><li data-list-item-id="ea0777730c7d119ef7aec1803a723945e">Submit page without checking box and exposing location picker<ul><li data-list-item-id="edd7f9586683cabe61026c1ad04f3d59c">Verify form moves to next page without required location validation message</li></ul></li><li data-list-item-id="e73bf2da16777d7a00263c238d61ddd8e">Check box and expose location picker; do not select location; submit page<ul><li data-list-item-id="ef4df33885780103082badeefa7982cbf">Verify validation prevents advancement through form</li></ul></li><li data-list-item-id="ebf5b8d1e59769e783b5c4932c9e4d46d">Select location, submit page<ul><li data-list-item-id="e1583386b1ecdaf5bd791d5aabcdb6e65">Verify form advances</li></ul></li></ul>'
    show_location_widget:
      '#type': checkbox
      '#title': 'Show location widget'
      '#primary_layer_source': /api/features/trashcans
      '#primary_layer_behavior': selection-only
      '#primary_layer_type': assets
      '#feature_layer_visible_zoom': 15
      '#incidents_layer_source': /api/tickets/test-trashcans
    location_2:
      '#type': portland_location_picker
      '#title': 'Location 2'
      '#description': '<ul><li data-list-item-id="e08c96629f287d92d5dce75ba07f565cd">Required</li><li data-list-item-id="eebc60b2acf03b9796c9e9e25c105ac17">Hidden by conditional logic</li><li data-list-item-id="eeb0e24c06df185f8ae21911971889a36">City limits geofencing</li></ul>'
      '#required': true
  page_3:
    '#type': webform_wizard_page
    '#title': 'Page 3'
    markup_02:
      '#type': webform_markup
      '#markup': '<p><strong>Configuration</strong></p><ul><li data-list-item-id="e1a6735be3efc8372d551fee47aa760fe">Location required</li><li data-list-item-id="eb038552ed1189f4c461747c55f3bb8b8">Displaying open Zendesk requests on map</li><li data-list-item-id="e5b8cbd5d91b33033e449683686cbacb0">In a container that''s hidden by default and exposed using conditional logic (check the box)</li></ul><p><strong>Testing</strong></p><ul><li data-list-item-id="ea0777730c7d119ef7aec1803a723945e">Zoom in to inner Southeast and verify open request markers appear on form</li><li data-list-item-id="e0795b93810248f7c6414dce7dd267cae">Submit page without checking the box that exposes the location picker<ul><li data-list-item-id="edd7f9586683cabe61026c1ad04f3d59c">Verify form moves to next page without required location validation message</li></ul></li><li data-list-item-id="e73bf2da16777d7a00263c238d61ddd8e">Check box and expose location picker; do not select location; submit page<ul><li data-list-item-id="ef4df33885780103082badeefa7982cbf">Verify validation prevents advancement through form</li></ul></li><li data-list-item-id="ebf5b8d1e59769e783b5c4932c9e4d46d">Select location, submit page<ul><li data-list-item-id="e1583386b1ecdaf5bd791d5aabcdb6e65">Verify form advances</li></ul></li></ul>'
    show_location_widget_2:
      '#type': checkbox
      '#title': 'Show location widget'
    container:
      '#type': container
      '#states':
        visible:
          ':input[name="show_location_widget_2"]':
            checked: true
      location_3:
        '#type': portland_location_picker
        '#title': 'Location 3'
        '#primary_layer_source': /api/tickets/test-graffiti
        '#primary_layer_behavior': informational
        '#primary_layer_type': incident
        '#feature_layer_visible_zoom': 15
        '#max_zoom': 19
        '#require_city_limits': true
        '#required': true
