_core:
  default_config_hash: Fo3XKbEeqdx7X61-VlOBdKL2Cmkob_nYWG6OdLKNbkU
enable_archive: false
enable_manual_archive: false
allow_archive_in_use: false
show_archived_label: true
archived_label_text: Archived
archive_registry_show_heading: true
archive_registry_heading: 'About This Archive'
archive_registry_styled_box: true
archive_registry_intro: '<p>This page lists archived materials retained solely for reference, research, or recordkeeping purposes. These materials are not used to meet current information or service needs and are no longer actively maintained.</p><p>Legacy Archive items may not meet current accessibility standards under ADA Title II provisions for archived content. General Archive items are retained for reference purposes without claiming accessibility exemption.</p><p>Archived materials may be stored in their original format and are not modified after being archived. Some archived materials may link to external resources that are not controlled by this website. Certain archived materials may require login if they were originally stored in private or restricted-access locations.</p><p>Archived materials are provided for historical reference only and may not reflect current policies or practices.</p><p>For an accessible or alternative format of any archived material listed below, please contact the accessibility resources on this website. Requests will be fulfilled within a reasonable timeframe in accordance with applicable accessibility standards.</p>'
scan_lock_stale_threshold_seconds: 300
scan_batch_time_budget_seconds: 10
scan_excluded_directories: {  }
scan_excluded_filenames: {  }
title_resolution_enabled: true
title_resolution_timeout: 3
title_resolution_max_per_cron: 50
title_resolution_retry_after_days: 7
