handlers:
  zendesk_new_request:
    id: zendesk
    handler_id: zendesk_new_request
    label: 'Create ticket in PP&R: Urban Forestry group'
    notes: 'Enabled if routing is "PP&R: UF Permitting"'
    status: true
    conditions:
      enabled:
        ':input[name="computed_routing"]':
          value: 'PP&R: UF Permitting'
        ':input[name="support_agent_use_only[test_submission]"]':
          unchecked: true
    weight: -50
    settings:
      requester_name: contact_name
      requester_email: contact_email
      subject: '[webform_submission:values:computed_subject]'
      comment: '[webform_submission:values:html]'
      tags: 'drupal webform [webform_submission:values:computed_tags]'
      priority: normal
      status: new
      recipient: ''
      group_id: '22777004934807'
