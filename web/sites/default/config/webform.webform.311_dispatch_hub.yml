uid: 60
template: false
archive: false
id: 311_dispatch_hub
title: 'Dispatch HUB'
description: ''
categories: {  }
elements: |-
  section_dispatch_use_only:
    '#type': webform_section
    '#title': 'Dispatch Use Only'
    '#attributes':
      style: 'background-color: #ccc; padding: 15px;'
    '#access_create_roles':
      - support_agent
      - administrator
    dispatch_employee_email:
      '#type': textfield
      '#title': 'Employee Email'
      '#readonly': true
      '#default_value': '[current-user:mail]'
    dispatch_contact_format:
      '#type': select
      '#title': 'Contact Format'
      '#options':
        walk_in: Walk-in
        phone: Phone
        radio: Radio
        email: Email
    dispatch_contact_type:
      '#type': select
      '#title': 'Contact Type'
      '#options':
        community: Community
        city_employee: 'City employee'
        pbot: PBOT
        ppb: PPB
        boec: BOEC
        pfr: 'PF&R'
        ppr: 'PP&R'
        agency_partner: 'Agency partner'
        odot: ODOT
        multco: 'Mult Co'
        metro: Metro
        trimet: TriMet
        other: Other
    dispatch_already_reported:
      '#type': checkbox
      '#title': 'Already reported'
    dispatch_related_emergency:
      '#type': checkbox
      '#title': 'Related to a declared emergency'
  section_dispatch_hub_location_of_issue:
    '#type': webform_section
    '#title': 'Location of Issue'
    report_location:
      '#type': portland_location_picker
      '#title': 'Location of Issue'
