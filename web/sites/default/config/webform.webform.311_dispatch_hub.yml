      '#location_details__counter_type': ''
  section_dispatch_hub_description:
    '#type': webform_section
    '#title': Description
    '#states':
      visible:
        - ':input[name="report_dispatch_hub_issue[radios]"]':
            value: 'Security Report'
        - or
        - ':input[name="report_dispatch_hub_issue[other]"]':
            filled: true
        - or
        - ':input[name="report_dispatch_hub_issue[radios]"]':
            '!value': 'Locate Calls'
        - or
        - ':input[name="report_dispatch_hub_obstruction_is_urgent"]':
            '!value': 'No'
    report_dispatch_hub_description_text:
      '#type': textarea
      '#title': Description
  report_dispatch_hub_issue:
    '#type': webform_radios_other
    '#title': 'What is the issue?'
    '#options':
      'Right-of-Way Maintenance': 'Right-of-Way Maintenance'
      'Right-of-Way Obstruction': 'Right-of-Way Obstruction'
      'Sewer or Stormwater Issue': 'Sewer or Stormwater Issue'
      'Hazardous Tree': 'Hazardous Tree'
      'Spills, pollution, or other hazardous materials': 'Spills, pollution, or other hazardous materials'
      'Confined Space Entry': 'Confined Space Entry'
      'Locate Calls': 'Locate Calls'
      'Key Request': 'Key Request'
      'Badge Request': 'Badge Request'
      'Security Report': 'Security Report'
      'Contractor Assist': 'Contractor Assist'
      'Winter Weather Request': 'Winter Weather Request -- snow removal, plowing, de-icing'
      'Referral or Information Only': 'Referral or Information Only -- Internal FYIs, general customer service provided or "phone switch" type referrals.'
      Tow-by-Hour: Tow-by-Hour
      Elevators: Elevators
    '#required': true
  section_dispatch_hub_row_maintenance:
    '#type': webform_section
    '#title': 'Right-of-way Maintenance'
    '#states':
      visible:
        ':input[name="report_dispatch_hub_issue[radios]"]':
          value: 'Right-of-Way Maintenance'
    report_issue_type:
      '#type': radios
      '#title': 'What are you trying to report?'
      '#prepopulate': true
      '#options':
        road: 'Damage to the Road surface (like potholes or pavement markings)'
        sign: 'Traffic or street sign'
        signal: 'Traffic signal, streetlight, pedestrian beacons, or convex mirrors'
        sidewalk: 'Sidewalk, curb, or stairs'
        bike_rack: 'Bike rack'
        calming: 'Traffic calming device'
        transit: 'Bus, MAX, Streetcar stop, rails, or signs'
        bridge: 'Bridge, tunnel, or guard rail'
        other: 'Something else'
    report_issue_type_road:
      '#type': webform_radios_other
      '#title': 'What type of damage are you reporting?'
      '#options':
        pothole: 'Pothole -- A rough hole in the road'
        sinkhole: 'Sinkhole -- A large depression, like the earth caved in'
        landslide: 'Landslide -- A mass of dirt or rocks that slid onto the road'
        utility_cut: 'Utility cut -- A square or rectangular cut in the road used to fix water or sewer lines'
        pavement_markings: 'Pavement markings are wearing or missing'
        gravel_street: 'Gravel street needs maintenance (call-log only)'
      '#other__option_label': 'Something else...'
      '#other__placeholder': 'Please describe'
      '#required': true
      '#states':
        visible:
          ':input[name="report_issue_type"]':
