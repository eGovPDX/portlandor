id: test_portland_alert
title: 'Test Portland Alert'
description: ''
categories:
  - Test
elements: |-
  markup:
    '#type': webform_markup
    '#markup': '<p>Screen reader testing protocol:</p><ul><li data-list-item-id="e37cc34ea0986d1c1b91f6419cca25420">Use NVDA or other screen reader</li><li data-list-item-id="ef92543fb96d20e7242b03f003d104e70">Use keyboard navigation to select the "Show alert" checkbox<ul><li data-list-item-id="ef7d16bce5ab46b761fc9606590b8e053">Verify the first alert;s text is read by the screen reader</li></ul></li><li data-list-item-id="e09bf8a6ba148e4b86f4aedc3ee11ef5d">Use keyboard navigation to select the "Show section" checkbox<ul><li data-list-item-id="e58e8252babf76ae409a45ffa2c6f5429">Verify the second alert''s text is read by the screen reader</li></ul></li></ul>'
  show_alert:
    '#type': checkbox
    '#title': 'Show alert'
  alert_test_1:
    '#type': portland_alert
    '#states':
      visible:
        ':input[name="show_alert"]':
          checked: true
    '#alert_markup': '<h2>Information</h2><p>This is an instance of a Portland Alert widget configured to display information.</p>'
  show_section:
    '#type': checkbox
    '#title': 'Show section'
  test_section_1:
    '#type': webform_section
    '#title': 'Test section 1'
    '#description': '<p>This section container includes an instance of a Portland Alert widget. This is to test whether it works when embedded in a container that has a visibility change, even though the widget itself does not use conditional logic.</p>'
    '#states':
      visible:
        ':input[name="show_section"]':
          checked: true
    alert_test_2:
      '#type': portland_alert
      '#alert_markup': "<p>Information</p><p>This Portland Alert widget instance does not have its own conditional logic to control visibility, but it's in a container that does.</p>"
