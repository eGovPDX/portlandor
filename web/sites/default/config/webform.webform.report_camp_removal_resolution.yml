elements: |-
  report_details:
    '#type': details
    '#title': 'Report Details'
    '#open': true
    section_report:
      '#type': webform_section
      '#title': Report
      '#title_display': invisible
      '#description_display': invisible
      report_problem_type:
        '#type': webform_radios_other
        '#title': 'What type of problem occurred?'
        '#disabled': true
        '#readonly': 0
        '#prepopulate': true
        '#options':
          'My property was taken.': 'Some, or all, of my property was not stored properly.'
          'A City employee or contractor was disrespectful.': 'A City employee or contractor was disrespectful.'
        '#other__option_label': 'Something else'
        '#other__placeholder': 'Please describe.'
        '#attributes':
          readonly: readonly
      report_employer:
        '#type': radios
        '#title': 'Who did the person work for?'
        '#disabled': true
        '#prepopulate': true
        '#options':
          'Rapid Response Bio Clean': 'Rapid Response Bio Clean (employees wear a blue shirt with the programâ€™s logo on the back) -- <img src="https://www.portland.gov/sites/default/files/styles/thumbnail/public/2024/rapidresponsebio-clean.jpg" />'
          'Central City Concern Clean Start Employee': 'Central City Concern Clean Start Employee (employees wear a bright orange shirt with the programâ€™s logo on the front) -- <img src="https://www.portland.gov/sites/default/files/styles/thumbnail/public/2022/clean-start-shirt.jpg" />'
          'City of Roses Disposal & Recycling': 'City of Roses Disposal & Recycling (employees wear a yellow shirt with the program''s logo on the back) -- <img src="https://www.portland.gov/sites/default/files/styles/thumbnail/public/2022/cor-shirt-back_0.jpg" />'
          'Portland Bureau of Transportation': 'Portland Bureau of Transportation'
          'Portland Fire & Rescue': 'Portland Fire & Rescue'
          'Portland Police Bureau': 'Portland Police Bureau'
        '#states':
          visible:
            ':input[name="report_problem_type[radios]"]':
              value: 'A City employee or contractor was disrespectful.'
      report_date:
        '#type': datetime
        '#title': 'When did the incident occur?'
        '#disabled': true
        '#prepopulate': true
        '#default_value': now
        '#format': ''
        '#date_date_format': m/d/Y
        '#datepicker': true
      report_location:
        '#type': portland_location_picker
        '#title': 'Where did the incident occur?'
        '#prepopulate': true
        '#precision_text__access': false
        '#location_address__title': 'Where did the incident occur?'
        '#location_lat__required': true
        '#place_name__access': false
        '#location_details__access': false
        '#location_type__access': false
        '#location_type__title': 'Where did the incident occur?'
        '#location_park_container__access': false
        '#location_private_owner__access': false
      report_description:
        '#type': textarea
        '#title': 'In your own words, describe the incident. Please explain what happened, who was involved, and any property taken and not properly stored.'
        '#description': '<p>To protect your privacy, do <strong>not</strong> include any personal or health-related information.</p>'
        '#description_display': before
        '#disabled': true
        '#prepopulate': true
        '#counter_type': word
        '#counter_maximum': 300
      report_has_witnesses:
        '#type': radios
        '#title': 'Were there witnesses to the incident?'
        '#disabled': true
        '#prepopulate': true
        '#options':
          'Yes': 'Yes'
          'No': 'No'
  original_submission_key:
    '#type': hidden
    '#title': 'Original Submission Key'
    '#prepopulate': true
  container_resolution_details:
    '#type': container
    fieldset_complainant:
      '#type': container
      '#title': Complainant
      '#title_display': invisible
      resolution_was_the_complainant_contacted:
        '#type': radios
        '#title': 'Was the complainant contacted?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
          'Unable to contact': 'Unable to contact'
      resolution_conversation_summary:
        '#type': textarea
        '#title': 'Summary of conversation with complainant'
        '#description': '<p>Leave blank if no contact</p>'
        '#description_display': before
    fieldset_first_witness:
      '#type': container
      '#title': 'First witness'
      '#open': 0
      '#states':
        visible:
          ':input[name="report_has_witnesses"]':
            value: 'Yes'
      '#attributes':
        class:
          - border
          - border-light
          - px-4
          - rounded
      resolution_first_witness_name:
        '#type': textfield
        '#title': 'First witness name'
        '#description_display': before
        '#prepopulate': true
      resolution_first_witness_contacted:
        '#type': radios
        '#title': 'Was this witness contacted?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
          'Unable to contact': 'Unable to contact'
      resolution_first_witness_conversation_summary:
        '#type': textarea
        '#title': 'Summary of conversation with witness'
        '#description_display': before
        '#states':
          visible:
            ':input[name="resolution_first_witness_contacted"]':
              value: 'Yes'
    fieldset_second_witness:
      '#type': container
      '#title': 'Second witness'
      '#open': 0
      '#states':
        visible:
          ':input[name="report_has_witnesses"]':
            value: 'Yes'
      '#attributes':
        class:
          - border
          - border-light
          - px-4
          - rounded
      resolution_second_witness_name:
        '#type': textfield
        '#title': 'Second witness name'
        '#description_display': before
        '#prepopulate': true
      resolution_second_witness_contacted:
        '#type': radios
        '#title': 'Was this witness contacted?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
          'Unable to contact': 'Unable to contact'
      resolution_second_witness_conversation_summary:
        '#type': textarea
        '#title': 'Summary of conversation with witness'
        '#description_display': before
        '#states':
          visible:
            ':input[name="resolution_second_witness_contacted"]':
              value: 'Yes'
    resolution_resolution_summary:
      '#type': textarea
      '#title': 'Summary of resolution actions taken or explanation of circumstances'
    resolution_resolution_date:
      '#type': date
      '#title': 'Date resolved/completed'
    report_ticket_id:
      '#type': hidden
      '#title': 'Report Ticket Id'
      '#prepopulate': true
