id: media.map.field_alt_text
field_name: field_alt_text
entity_type: media
bundle: map
label: 'Alternative text'
description: "<p>A textual alternative description of the map content, used for assistive technology like screen readers.</p>\r\n<ul>\r\n<li>Example: <em>\"Construction is happening on the north side of NE Alberta Street between 7th Ave and 15th Ave.\"</em></li>\r\n<li>If the text on the page around the map already describes (or provides equivalent information to) the map, it is not necessary to reiterate in the alt text: a short summary like <em>\"Areas of construction\"</em> would suffice.</li>\r\n<li>For complex maps that cannot be summarized in a few sentences, it is best to put the description elsewhere on the page and reference it as the alt text. Example: <em>\"Parking zone boundaries. Described under the heading Parking zones.\"</em> The location information needs to be clear and accurate to help users locate the content.</li>\r\n<li>Do not start the alt text with <em>\"Map of.\"</em> The accessible label for the map will already indicate that it is a map.</li>\r\n</ul>"
required: true
translatable: true
default_value: {  }
default_value_callback: ''
settings: {  }
field_type: string_long
