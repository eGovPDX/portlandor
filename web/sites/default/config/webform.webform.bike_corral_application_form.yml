id: bike_corral_application_form
title: 'Bike Corral Application Form'
description: ''
categories: {  }
elements: |-
  markup:
    '#type': webform_markup
    '#markup': '<p>Bike corrals are groups of bike racks installed in the on-street parking area.</p><p>The City of Portland will prioritize bike corrals at street block corners. Bike corrals increase customer parking, improve street crossings by reducing pedestrian crossing distances, and increase business visibility.</p>'
  installation_fee_requirements:
    '#type': webform_section
    '#title': 'Installation Fee Requirements'
    '#description': '<p>Installation Fee is $3,068 as of FY 2024-2025 • The fee helps off-set the City’s subsidy and fulfill a corral request more quickly. • The fee is required for corrals in areas with metered parking.</p>'
    '#description_display': before
    apply_equipment_fee:
      '#type': webform_radios_other
      '#title': 'Are you paying the $3,068 fee?'
      '#options': yes_no
      '#other__option_label': 'Need more information '
      '#required': true
    apply_corral_location:
      '#type': webform_address
      '#title': 'What is the address where the bike corral is requested?'
      '#title_display': before
      '#required': true
      '#country__access': false
    apply_peak_time:
      '#type': textfield
      '#title': 'What time of day is the peak demand for bike parking at this location?'
      '#description': '<p>e.g. 4-6pm</p>'
      '#description_display': before
      '#required': true
    apply_exisiting_bike_racks:
      '#type': textfield
      '#title': 'How many existing bicycle racks are there?'
      '#required': true
    apply_bikes_parked:
      '#type': textfield
      '#title': 'How many bicycles are typically parked here?'
      '#required': true
  site_information:
    '#type': webform_section
    '#title': 'Site Information'
    apply_establishment_length:
      '#type': textfield
      '#title': 'Length of Establishment’s Storefront in feet'
      '#required': true
    apply_bike_corral_span:
      '#type': radios
      '#title': 'Is the on-street bike corral intended to span more than one business?'
      '#description': '<p>If the answer to this question is “yes”, each business must provide approval.</p>'
      '#description_display': before
      '#options': yes_no
      '#required': true
    apply_current_parking:
      '#type': textarea
      '#title': 'What kind of parking is currently allowed'
      '#description': '<p>e.g.15 min. zone, Loading Only zone</p>'
      '#description_display': before
      '#required': true
    apply_metered_spaces:
      '#type': radios
      '#title': 'Are there metered parking spaces at the site?'
      '#options': yes_no
      '#required': true
    apply_moving_traffic:
      '#type': radios
      '#title': 'Is there a moving lane of traffic directly next to the curb at any time of day?'
      '#options': yes_no
      '#required': true
    apply_fire_hydrant:
      '#type': radios
      '#title': 'Is there a fire hydrant?'
      '#options': yes_no
      '#required': true
    apply_bus_stop:
      '#type': radios
      '#title': 'Is there a bus stop in front of the business?'
      '#options': yes_no
      '#required': true
  business_information:
    '#type': webform_section
    '#title': 'Business Information '
    apply_applicant_name:
      '#type': textfield
      '#title': 'Applicant Name'
      '#autocomplete': name
      '#required': true
    apply_applicant_phone:
      '#type': textfield
      '#title': 'Applicant phone number'
      '#autocomplete': tel
      '#input_mask': '(999) 999-9999'
      '#required': true
    apply_applicant_email:
      '#type': textfield
      '#title': 'Applicant email address'
      '#autocomplete': email
      '#input_mask': "'alias': 'email'"
      '#required': true
  property_owner_information:
    '#type': webform_section
    '#title': 'Property Owner Information '
    apply_business_name:
      '#type': textfield
      '#title': 'Business name'
      '#required': true
    apply_business_street_address:
      '#type': webform_address
      '#title': 'Business street address'
      '#required': true
      '#country__access': false
    apply_business_owner_manager:
      '#type': textfield
      '#title': 'Business owner or manager'
      '#required': true
    apply_best_contact:
      '#type': radios
      '#title': 'Best contact for business owner or manager'
      '#options':
        Email: Email
        Phone: Phone
      '#required': true
    apply_name_property_owner_representative:
      '#type': textfield
      '#title': 'Name of property owner or representative'
      '#required': true
    apply_propert_address:
      '#type': webform_address
      '#title': 'Property address'
      '#required': true
      '#country__access': false
    apply_property_owner_contact_type:
      '#type': radios
      '#title': 'Best contact for prop. owner or rep'
      '#options':
        Email: Email
        Phone: Phone
      '#required': true
  business_and_property_owner_affirmation:
    '#type': webform_section
    '#title': 'Business and Property Owner’s Affirmation '
    '#description': '<p><span class="helpText">I, the undersigned, do affirm that I am the owner or a duly authorized representative of the corporation owning the above referenced property. I have been made aware of the Applicant’s intent to install a curbside Bike Corral in the curb lane in front of the business listed on this application and have no objections.</span></p>'
    apply_business_owner_signature:
      '#type': textfield
      '#title': 'Type business owner name in lieu of signature'
      '#description': '<p>Alternatively, written approval in the form of an email can be sent to bikeparking@portlandoregon.gov.</p>'
      '#description_display': before
      '#required': true
    apply_property_owner_signature:
      '#type': textfield
      '#title': 'Type property owner name in lieu of signature'
      '#description': '<p>Alternatively, written approval in the form of an email can be sent to bikeparking@portlandoregon.gov.</p>'
      '#description_display': before
      '#required': true
  maintenance_agreement:
    '#type': webform_section
    '#title': 'Maintenance Agreement '
    '#description': '<p>This facility will be built under the auspices of a temporary and revocable permit. Because PBOT will be unable to maintain the facility to city standards, the tenants at the above property or the owner of said property are entering this agreement with PBOT. To facilitate the installation of the facility, it is agreed that:</p><ol><li data-list-item-id="e8101be11e9e7568474925fc382c1f006">The facility will be swept and otherwise cleared of all debris, fallen leaves and garbage when needed. All trash will be removed from the facility and hauled with the regular trash hauling provided for by the subject property.</li><li data-list-item-id="e955f9b63bf31fb90f6025d6d375ac325">The facility will receive occasional visual inspections. If debris and trash have collected to a noticeable degree during this inspection, the facility will be swept as described in item 1.</li><li data-list-item-id="ee9f54f55cd41712f3bbc7e1d6ddc5de3">Evidence of damage, vandalism, or the presence of abandoned bicycles can be reported to PBOT staff. The 24-Hour Maintenance &amp; Repair hotline is (503) 823-1700 or email <a href="mailto:bikeparking@portlandoregon.gov">bikeparking@portlandoregon.gov</a>.</li><li data-list-item-id="eba7289f43a09a22f37de3e601df32d8c">If citizen complaints are received by PBOT, the following steps will be taken:<ol type="a"><li data-list-item-id="e846ea838796d50f54e327b2722e004b3">A field investigation will be completed by Traffic Investigations</li><li data-list-item-id="e6c886ebaad5e934601cc4c6456736aef">If the maintenance level is deemed unacceptable by Traffic Investigations, both the merchant and property owner will be sent a letter about the situation and given the opportunity to respond in writing.</li><li data-list-item-id="e102735947ec70eb280b3b2aaf169dd6e">Response to the complaint will result in either: 1) No action; 2) A warning; 3) A change to this agreement if both PBOT and the agreeing party sign the changes; or 4) Revocation of the permit by the City Traffic Engineer.</li></ol></li><li data-list-item-id="e2c3e564716f947dd0b41523438fd570d">Future enhancements to this facility will be considered by PBOT. Any proposed enhancement must satisfy the requirements of all public agencies with jurisdiction over the request.</li></ol>'
    apply_agreement_signature:
      '#type': textarea
      '#title': 'Primary responsibility for this agreement falls on'
      '#description': '<p>Business Name, Business Address</p>'
      '#required': true
  corral_address:
    '#type': webform_computed_twig
    '#title': 'Corral Address'
    '#display_on': none
    '#template': '{{ [data.apply_corral_location.address, data.apply_corral_location.address_2, data.apply_corral_location.city, data.apply_corral_location.state_province, data.apply_corral_location.postal_code] | filter(v => v is not empty) | join(", ") }}'
    '#ajax': true
  business_address:
    '#type': webform_computed_twig
    '#title': 'Business Address'
    '#display_on': none
    '#template': '{{ [data.apply_business_street_address.address, data.apply_business_street_address.address_2, data.apply_business_street_address.city, data.apply_business_street_address.state_province, data.apply_business_street_address.postal_code] | filter(v => v is not empty) | join(", ") }}'
    '#ajax': true
  property_address:
    '#type': webform_computed_twig
    '#title': 'Property Address'
    '#display_on': none
    '#template': '{{ [data.apply_propert_address.address, data.apply_propert_address.address_2, data.apply_propert_address.city, data.apply_propert_address.state_province, data.apply_propert_address.postal_code] | filter(v => v is not empty) | join(", ") }}'
    '#ajax': true
