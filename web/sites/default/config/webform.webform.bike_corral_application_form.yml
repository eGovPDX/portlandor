id: bike_corral_application_form
title: 'Bike Corral Application Form'
description: ''
categories: {  }
elements: |-
  markup:
    '#type': webform_markup
    '#markup': '<p>Bike corrals are groups of bike racks installed in the on-street parking area.</p><p>The City of Portland will prioritize bike corrals at street block corners. Bike corrals increase customer parking, improve street crossings by reducing pedestrian crossing distances, and increase business visibility.</p>'
  installation_fee_requirements:
    '#type': webform_section
    '#title': 'Installation Fee Requirements'
    '#description': '<p>Installation Fee is $3,068 as of FY 2024-2025 • The fee helps off-set the City’s subsidy and fulfill a corral request more quickly. • The fee is required for corrals in areas with metered parking.</p>'
    '#description_display': before
    apply_equipment_fee:
      '#type': webform_radios_other
      '#title': 'Are you paying the $3,068 fee?'
      '#options': yes_no_not_sure
    apply_corral_location:
      '#type': webform_address
      '#title': 'What is the address where the bike corral is requested?'
    apply_peak_hours:
      '#type': textarea
      '#title': 'What time of day is the peak demand for bike parking at this location?'
      '#description': '<p>(e.g. 4-6pm)</p>'
      '#description_display': before
    apply_bike_racks_available:
      '#type': textarea
      '#title': 'How many existing bicycle racks are there? '
    apply_average_usage:
      '#type': textarea
      '#title': 'How many bicycles are typically parked here?'
  site_information:
    '#type': webform_section
    '#title': 'Site Information'
    apply_storefront_length:
      '#type': textarea
      '#title': 'Length of Establishment’s Storefront in feet (e.g. 50 feet)'
    apply_bike_corral_span:
      '#type': radios
      '#title': 'Is the on-street bike corral intended to span more than one business?'
      '#description': '<p>If the answer to this question is “yes”, each business must provide approval.</p>'
      '#description_display': before
      '#options': yes_no
    apply_current_parking:
      '#type': textarea
      '#title': 'What kind of parking is currently allowed'
      '#description': '<p>(e.g.15 min. zone, Loading Only zone)</p>'
      '#description_display': before
    apply_metered_spaces:
      '#type': radios
      '#title': 'Are there metered parking spaces at the site?'
      '#options': yes_no
    apply_moving_traffic:
      '#type': radios
      '#title': 'Is there a moving lane of traffic directly next to the curb at any time of day?'
      '#options': yes_no
    apply_fire_hydrant:
      '#type': radios
      '#title': 'Is there a fire hydrant?'
      '#options': yes_no
    apply_bus_stop:
      '#type': radios
      '#title': 'Is there a bus stop in front of the business?'
      '#options': yes_no
  business_information:
    '#type': webform_section
    '#title': 'Business Information '
    apply_applicant_name:
      '#type': textfield
      '#title': 'Applicant Name'
      '#autocomplete': name
    apply_applicant_phone:
      '#type': textfield
      '#title': 'Applicant phone number'
      '#autocomplete': tel
      '#input_mask': '(999) 999-9999'
    apply_applicant_email:
      '#type': textfield
      '#title': 'Applicant email address'
      '#autocomplete': email
      '#input_mask': "'alias': 'email'"
  property_owner_information:
    '#type': webform_section
    '#title': 'Property Owner Information '
    apply_business_name:
      '#type': textfield
      '#title': 'Business name'
    apply_business_street_address:
      '#type': webform_address
      '#title': 'Business street address'
    apply_business_owner_manager:
      '#type': textfield
      '#title': 'Business owner or manager'
    apply_best_contact:
      '#type': radios
      '#title': 'Best contact for business owner or manager'
      '#options':
        Email: Email
        Phone: Phone
    apply_name_property_owner_representative:
      '#type': textfield
      '#title': 'Name of property owner or representative'
    apply_propert_address:
      '#type': webform_address
      '#title': 'Propert address'
    apply_property_owner_contact_type:
      '#type': radios
      '#title': 'Best contact for prop. owner or rep'
      '#options':
        Email: Email
        Phone: Phone
  business_and_property_owner_affirmation:
    '#type': webform_section
    '#title': 'Business and Property Owner’s Affirmation '
    '#description': '<p><span class="helpText">I, the undersigned, do affirm that I am the owner or a duly authorized representative of the corporation owning the above referenced property. I have been made aware of the Applicant’s intent to install a curbside Bike Corral in the curb lane in front of the business listed on this application and have no objections.</span></p>'
    apply_business_owner_signature:
      '#type': textfield
      '#title': 'Type business owner name in lieu of signature (Alternatively, written approval in the form of an email can be sent to bikeparking@portlandoregon.gov.) '
    apply_property_owner_signature:
      '#type': textfield
      '#title': 'Type property owner name in lieu of signature (Alternatively, written approval in the form of an email can be sent to bikeparking@portlandoregon.gov.)'
  maintenance_agreement:
    '#type': webform_section
    '#title': 'Maintenance Agreement '
    '#description': '<p><span class="helpText">This facility will be built under the auspices of a temporary and revocable permit. Because PBOT will be unable to maintain the facility to city standards, the tenants at the above property or the owner of said property are entering this agreement with PBOT. To facilitate the installation of the facility, it is agreed that:</span></p><p>1. The facility will be swept and otherwise cleared of all debris, fallen leaves and garbage when needed. All trash will be removed from the facility and hauled with the regular trash hauling provided for by the subject property.</p><p>2. The facility will receive occasional visual inspections. If debris and trash have collected to a noticeable degree during this inspection, the facility will be swept as described in item 1.</p><p>3. Evidence of damage, vandalism, or the presence of abandoned bicycles can be reported to PBOT staff. The 24-Hour Maintenance &amp; Repair hotline is (503) 823-1700 or email bikeparking@portlandoregon.gov.</p><p>4. If citizen complaints are received by PBOT, the following steps will be taken:&nbsp;<br><span style="margin-left:28px;">a) A field investigation will be completed by Traffic Investigations</span>&nbsp;<br><span style="margin-left:28px;">b) If the maintenance level is deemed unacceptable by Traffic Investigations, both the merchant and property owner will be sent&nbsp;</span><br><span style="margin-left:45px;">a letter about the situation and given the opportunity to respond in writing.</span><span style="margin-left:28px;">&nbsp;</span><br><span style="margin-left:28px;">c) Response to the complaint will result in either: 1) No action; 2) A warning; 3) A change to this agreement if both PBOT and&nbsp;</span><br><span style="margin-left:45px;">the agreeing party sign the changes; or 4) Revocation of the permit by the City Traffic Engineer.</span></p><p>5. Future enhancements to this facility will be considered by PBOT. Any proposed enhancement must satisfy the requirements of all public agencies with jurisdiction over the request.</p>'
    apply_agreement_signature:
      '#type': textarea
      '#title': 'Primary responsibility for this agreement falls on [Business Name, Business Address]:'
