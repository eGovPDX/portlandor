id: report_webform_feedback
title: 'Report webform feedback'
description: '<p>This form replaces the obsolete demographics form that users may complete after submitting a webform.</p>'
categories:
  - Report
elements: |-
  report_ease_of_use:
    '#type': radios
    '#title': 'How easy was it to complete the form you just submitted?'
    '#options':
      'Very easy': 'Very easy'
      'Somewhat easy': 'Somewhat easy'
      Neutral: Neutral
      'Somewhat difficult': 'Somewhat difficult'
      'Very difficult': 'Very difficult'
  report_satisfaction:
    '#type': radios
    '#title': 'How satisfied are you with the experience?'
    '#options':
      'Very satisfied': 'Very satisfied'
      'Somewhat satisfied': 'Somewhat satisfied'
      Neutral: Neutral
      'Somewhat unsatisfied': 'Somewhat unsatisfied'
      'Very unsatisfied': 'Very unsatisfied'
  report_able_to_complete:
    '#type': radios
    '#title': 'Did you accomplish what you wanted to do?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      Partially: Partially
  report_have_needed_info:
    '#type': radios
    '#title': 'Do you know what happens next?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
  report_helpful_info:
    '#type': textfield
    '#title': 'What information would be helpful?'
    '#states':
      visible:
        ':input[name="report_have_needed_info"]':
          value: 'No'
  report_requested_improvements:
    '#type': textarea
    '#title': 'How can we improve?'
    '#description': '<p>This survey is anonymous, so we can''t respond to individual comments. If you have concerns and would like a response, please <a href="/311/contact-311">contact 311</a>.</p>'
    '#description_display': before
    '#counter_type': character
    '#counter_maximum': 1000
  report_form_id:
    '#type': hidden
    '#title': 'Webform ID'
    '#prepopulate': true
