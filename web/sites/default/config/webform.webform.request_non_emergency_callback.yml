id: request_non_emergency_callback
title: 'Request Non-emergency Callback '
description: ''
categories:
  - Request
elements: |-
  request_life_safety:
    '#type': select
    '#title': 'Is this a potential emergency?'
    '#options':
      'Yes, someone may be in immediate danger. ': 'Yes, someone may be in immediate danger. '
      'Yes, requesting assistance from Portland Street Response.': 'Yes, requesting assistance from Portland Street Response.'
      'Yes, there is a crime in progress.': 'Yes, there is a crime in progress.'
      'Yes, a person is missing.': 'Yes, a person is missing.'
      'Yes, a person has been found.': 'Yes, a person has been found.'
      'Yes, another type of emergency.': 'Yes, another type of emergency.'
      'No': 'No'
    '#empty_option': Select...
  request_call_911:
    '#type': webform_markup
    '#states':
      visible:
        - ':input[name="request_life_safety"]':
            value: 'Yes, someone may be in immediate danger. '
        - or
        - ':input[name="request_life_safety"]':
            value: 'Yes, requesting assistance from Portland Street Response.'
        - or
        - ':input[name="request_life_safety"]':
            value: 'Yes, another type of emergency.'
    '#markup': |-
      <div class="alert alert--warning next-steps">
      <h2>Urgent</h2>

      <p class="mb-0">Ask caller to hang up and call 911.</p>

      <p class="mb-0"><br />
      -OR-&nbsp;<br />
      <br />
      You can also warm transfer to 3-1923 if it seems beneficial.<br />
      <strong>***NEVER give out this number***</strong></p>
      </div>
  request_call_911_2:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_life_safety"]':
          value: 'Yes, there is a crime in progress.'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Attention</h2>

      <p class="mb-0">If the crime is happening now and the suspect is still present or in sight, ask the caller to hang up and call 911. If the crime has already occurred and the suspect has left, continue to the next question and select “crime that has already occurred”.&nbsp;</p>
      </div>
  request_call_911_3:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_life_safety"]':
          value: 'Yes, a person is missing.'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Attention</h2>

      <p class="mb-0">If this is the first time the caller is reporting the person missing, tell them to hang up and call 911. If they are calling to follow-up on a previous report, or the person has been found or has returned, continue to the next question and select “missing or found person”.&nbsp;</p>
      </div>
  request_call_911_4:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_life_safety"]':
          value: 'Yes, a person has been found.'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Attention</h2>

      <p class="mb-0">If the caller wants to report a found person (e.g. a child or person with dementia wandering) tell them to hang up and call 911. If they are calling to follow-up on a previous report, or the person has been found or has returned, continue to the next question and select “missing or found person”.</p>
      </div>
  request_callback_reason:
    '#type': webform_radios_other
    '#title': 'What is the caller requesting a callback for? '
    '#options':
      'Animal-related issue': 'Animal-related issue'
      'Court order violation': 'Court order violation'
      'Crime that has already occurred': 'Crime that has already occurred'
      'Missing or found person (non-emergency)': 'Missing or found person (non-emergency)'
      'Noise complaint': 'Noise complaint'
      'Officer request / civil standby': 'Officer request / civil standby'
      'Police records': 'Police records'
      'Traffic safety hazard': 'Traffic safety hazard'
      'Trespassing, unwanted person, or occupied campsite on private property': 'Trespassing, unwanted person, or occupied campsite on private property'
      'Stolen or recovered vehicle': 'Stolen or recovered vehicle'
      'Vehicle crash/accident': 'Vehicle crash/accident'
      'Welfare check': 'Welfare check'
    '#other__option_label': 'Something else...'
    '#other__placeholder': 'Please describe...'
    '#states':
      visible:
        - ':input[name="request_life_safety"]':
            value: 'No'
        - or
        - ':input[name="request_life_safety"]':
            value: 'Yes, there is a crime in progress.'
        - or
        - ':input[name="request_life_safety"]':
            value: 'Yes, a person is missing.'
        - or
        - ':input[name="request_life_safety"]':
            value: 'Yes, a person has been found.'
  request_animal_related:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_callback_reason[radios]"]':
          value: 'Animal-related issue'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Information</h2>

      <p class="mb-0">See the <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/7498822510743-Report-Animal-Crimes-Animal-Cruelty">Animal Crimes/Cruelty</a>, <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/6150440858135-Info-on-Barking-Dogs-Other-Nuisances">Info on Barking Dogs and other Nuisances</a>, and the <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/6148567860887-File-an-Animal-Nuisance-Complaint">Animal Nuisance Complaint</a> articles for more information.</p>
      </div>
  markup_noise_complaint:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_callback_reason[radios]"]':
          value: 'Noise complaint'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Information</h2>

      <p><u>Noise Complaints</u></p>

      <p class="mb-0">Portland: https://portlandoregon.zendesk.com/hc/en-us/articles/6127014217751-File-a-Noise-Complaint-Portland<br />
      Gresham: https://portlandoregon.zendesk.com/hc/en-us/articles/6146303308439-File-a-Noise-Complaint-City-of-Gresham<br />
      Other locations in Multnomah County: [missing link]<br />
      Related to PDX Airport: https://portlandoregon.zendesk.com/hc/en-us/articles/6127317991447-File-a-Noise-Complaint-Aircraft-In-Flight</p>
      </div>
  markup_police_records:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_callback_reason[radios]"]':
          value: 'Police records'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Information</h2>

      <p class="mb-0">Portland: The Records Division Zendesk Guide section (https://portlandoregon.zendesk.com/hc/en-us/sections/4403569090455-Records-Divison) has multiple resources depending on the type of record the caller is requesting.<br />
      Gresham: [missing link]<br />
      Other locations in Multnomah County: [missing link]</p>
      </div>
  markup_traffic_hazard:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_callback_reason[radios]"]':
          value: 'Traffic safety hazard'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Information</h2>

      <p class="mb-0">Portland: https://portlandoregon.zendesk.com/hc/en-us/articles/4405743813399-Info-on-PBOT-Dispatch-Transportation-Maintenance-Operations-Dispatch-BOM<br />
      Multnomah County: https://portlandoregon.zendesk.com/hc/en-us/articles/12929521258007-Report-Hazardous-Road-Conditions-Multnomah-County<br />
      ODOT: https://portlandoregon.zendesk.com/hc/en-us/articles/4405750568471-Info-on-ODOT-State-Department-of-TransportationLink to MO form?</p>
      </div>
  markup_stolen_vehicle:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="request_callback_reason[radios]"]':
          value: 'Stolen or recovered vehicle'
    '#markup': |-
      <div class="alert alert--info next-steps">
      <h2>Information</h2>

      <p class="mb-0">Check to see if it was towed (see https://portlandoregon.zendesk.com/hc/en-us/articles/4405750712855-Info-on-PPB-Auto-Records-Towed-Stolen-Missing).<br />
      <br />
      If not, continue with form.&nbsp;</p>
      </div>
  container_report:
    '#type': container
    '#states':
      invisible:
        - ':input[name="request_life_safety"]':
            unchecked: true
        - or
        - ':input[name="request_callback_reason[radios]"]':
            value: 'Noise complaint'
        - or
        - ':input[name="request_callback_reason[radios]"]':
            value: 'Police records'
    container_crime_report:
      '#type': container
      '#states':
        visible:
          ':input[name="request_callback_reason[radios]"]':
            value: 'Crime that has already occurred'
      request_crime_type:
        '#type': webform_radios_other
        '#title': 'What type of crime are they trying to report? '
        '#options':
          'A crime that can often be reported online': |-
            A crime that can often be reported online -- Including:
            Theft
            Burglary to a shed, storage unit, or unattached garage
            Fraud or identity theft
            Suspicious activity
            Vandalism
            Hit & run
          'A crime that must be reported to a police officer': |-
            A crime that must be reported to a police officer -- Including:
            Abuse
            Assault
            Burglary to a residence or business
            Restraining order violation
            Retail theft
            Robbery
            Stolen or recovered vehicle
            Trespassing
            Vice Issues (drugs, liquor, prostitution, gambling)
        '#other__option_label': 'Something else'
        '#required': true
      container_can_report_online:
        '#type': container
        '#states':
          visible:
            ':input[name="request_crime_type[radios]"]':
              value: 'A crime that can often be reported online'
        request_crime_identity_known:
          '#type': radios
          '#title': 'Do they know the identity of the suspect(s) involved? '
          '#description': '<p><span style="font-size:11.0pt"><span style="line-height:107%"><span style="font-family:&quot;Open Sans&quot;,sans-serif">(i.e., they know their name, home address, or license plate number)</span></span></span></p>'
          '#options':
            'No': 'No'
            'Yes': 'Yes'
          '#required': true
        markup_identity_known:
          '#type': webform_markup
          '#states':
            visible:
              ':input[name="request_crime_identity_known"]':
                value: 'Yes'
          '#markup': |-
            <div class="alert alert--info next-steps">
            <h2>Information</h2>

            <p class="mb-0">They will need to speak to a police officer to report this crime. Please complete this form for a callback.</p>
            </div>
        container_suspect_unknown:
          '#type': container
          '#states':
            visible:
              ':input[name="request_crime_identity_known"]':
                value: 'No'
          request_crime_firearm_narcotic:
            '#type': radios
            '#title': 'Did the incident involve a firearm or narcotic prescription medication?'
            '#description': '<p>(e.g., a firearm or prescription drugs were stolen)</p>'
            '#options':
              'No': 'No'
              'Yes': 'Yes'
            '#required': true
          markup_firearm:
            '#type': webform_markup
            '#states':
              visible:
                ':input[name="request_crime_firearm_narcotic"]':
                  value: 'Yes'
            '#markup': |-
              <div class="alert alert--info next-steps">
              <h2>Information</h2>

              <p class="mb-0">They will need to speak to a police officer to report this crime. Please complete this form for a callback.</p>
              </div>
          container_no_firearm:
            '#type': container
            '#states':
              visible:
                ':input[name="request_crime_firearm_narcotic"]':
                  value: 'No'
            report_where_occurrence:
              '#type': radios
              '#title': 'Where did the incident occur?'
              '#options':
                Portland: Portland
                Gresham: Gresham
                'Troutdale, Fairview, Wood Village, or Maywood Park': 'Troutdale, Fairview, Wood Village, or Maywood Park'
                'Unincorporated Multnomah County, including the communities of Corbett, Dunthorpe, Orient, Springdale and Sauvie Island': 'Unincorporated Multnomah County, including the communities of Corbett, Dunthorpe, Orient, Springdale and Sauvie Island'
              '#required': true
            markup_portland:
              '#type': webform_markup
              '#states':
                visible:
                  ':input[name="report_where_occurrence"]':
                    value: Portland
              '#markup': |-
                <div class="alert alert--info next-steps">
                <h2>Information</h2>

                <p class="mb-0">This incident can likely be <a href="https://www.portlandoregon.gov/police/cor/">reported online</a>. See article for <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/4405744496023-File-a-Police-Report-Portland">more information</a>.</p>
                </div>
            markup_gresham:
              '#type': webform_markup
              '#states':
                visible:
                  ':input[name="report_where_occurrence"]':
                    value: Gresham
              '#markup': |-
                <div class="alert alert--info next-steps">
                <h2>Information</h2>

                <p class="mb-0">This incident can likely be <a href="https://greshamoregon.gov/File-a-Police-Report-Online/">reported online</a>. See article for <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/6609896394391-File-a-Police-Report-City-of-Gresham">more information</a>.</p>
                </div>
            markup_troutdale:
              '#type': webform_markup
              '#states':
                visible:
                  ':input[name="report_where_occurrence"]':
                    value: 'Troutdale, Fairview, Wood Village, or Maywood Park'
              '#markup': |-
                <div class="alert alert--info next-steps">
                <h2>Information</h2>

                <p class="mb-0">This incident can likely be&nbsp;<a href="https://mcso.mycasenumber.us/">reported online</a> through the Multnomah County Sheriff’s Office. See article for <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/10144547824407-File-a-Police-Report-Multnomah-County-Sheriff">more information</a>.</p>
                </div>
            markup_unincorporated:
              '#type': webform_markup
              '#states':
                visible:
                  ':input[name="report_where_occurrence"]':
                    value: 'Unincorporated Multnomah County, including the communities of Corbett, Dunthorpe, Orient, Springdale and Sauvie Island'
              '#markup': |-
                <div class="alert alert--info next-steps">
                <h2>Information</h2>

                <p class="mb-0">This incident can likely be&nbsp;<a href="https://mcso.mycasenumber.us/">reported online</a> through the Multnomah County Sheriff’s Office. See article for <a href="https://portlandoregon.zendesk.com/hc/en-us/articles/10144547824407-File-a-Police-Report-Multnomah-County-Sheriff">more information</a>.</p>
                </div>
    container_crash:
      '#type': container
      '#states':
        visible:
          ':input[name="request_callback_reason[radios]"]':
            value: 'Vehicle crash/accident'
      report_crash_details:
        '#type': radios
        '#title': 'Do any of the following apply?'
        '#options':
          'Someone was injured': 'Someone was injured -- Minor injuries only; emergencies should to to 911'
          'Uninsured driver installed': 'Uninsured driver installed'
          'Hit & run': 'Hit & run'
          'None of the above': 'None of the above'
      markup_crash_none_of_the_above:
        '#type': webform_markup
        '#states':
          visible:
            ':input[name="report_crash_details"]':
              value: 'None of the above'
        '#markup': |-
          <div class="alert alert--info next-steps">
          <h2>Information</h2>

          <p>If the caller has been involved in a non-injury accident, they need to exchange&nbsp;information with the other driver, including their name, address, license plate number and&nbsp;insurance information. After exchanging information there is no need to remain at the scene. If&nbsp;there is more than $2500 damage to the vehicles both parties are required to file a state accident&nbsp;report within 3 days of the accident. Forms are available online at <a href="https://oregondmv.com ">oregondmv.com </a>or at any&nbsp;DMV office or police precinct.</p>

          <p class="mb-0"><strong>Do not request a callback through this form – the police will not send an officer out to take a&nbsp;report.</strong></p>
          </div>
    container_submit:
      '#type': container
      '#states':
        invisible:
          - ':input[name="request_callback_reason[radios]"]':
              unchecked: true
          - or
          - ':input[name="request_callback_reason[radios]"]':
              value: 'Animal-related issue'
          - or
          - ':input[name="request_callback_reason[radios]"]':
              value: 'Noise complaint'
          - or
          - ':input[name="request_callback_reason[radios]"]':
              value: 'Police records'
          - or
          - ':input[name="request_callback_reason[radios]"]':
              value: 'Traffic safety hazard'
          - or
          - ':input[name="report_crash_details"]':
              value: 'None of the above'
      container_contact:
        '#type': container
        callback_name:
          '#type': textfield
          '#title': Name
          '#required': true
        callback_phone_number:
          '#type': textfield
          '#title': 'Callback Phone Number'
          '#required': true
      actions:
        '#type': webform_actions
        '#title': 'Submit button(s)'
        '#submit__label': Submit
