id: report_noise_concern
title: 'Report Noise Concern'
description: ''
categories: {  }
elements: |-
  report_noise_type:
    '#type': select
    '#title': 'What type of noise do you want to report?'
    '#options':
      'Aircraft in flight': 'Aircraft in flight -- i.e. planes and helicopters'
      Alarm: Alarm
      Animals: 'Animals -- dogs and chickens'
      'Amplified announcements ': 'Amplified annoucements '
      'Car racing': 'Car racing'
      Construction: Construction
      'Daycare operations or children at play': 'Daycare operations or children at play'
      'Garbage trucks': 'Garbage trucks'
      HVAC: HVAC
      'Human voices (non-amplified)': 'Human voices (non-amplified)'
      'Industrial/commercial noises': 'Industrial/commercial noises'
      'Leaf blowers': 'Leaf blowers'
      'Pressure washers': 'Pressure washers'
      'Mechanical noises': 'Mechanical noises'
      Music: Music
      'Sports and recreation': 'Sports and recreation'
      'Traffic or vehicle noise': 'Traffic or vehicle noise'
      Train: Train
      Watercraft: Watercraft
      Other: Other
    '#other__option_label': 'Something else'
    '#other__placeholder': 'Please describe'
    '#required': true
  markup_continue:
    '#type': webform_markup
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          empty: true
    '#markup': '<p><strong>Please make a selection to continue.</strong></p>'
  container_alarm:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: Alarm
    report_alarm_type:
      '#type': radios
      '#title': 'What type of alarm?'
      '#options':
        'Car alarm': 'Car alarm'
        Other: Other
  container_amplified:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: 'Amplified announcements '
    report_amplified_type:
      '#type': radios
      '#title': 'What type of amplified announcements?'
      '#options':
        Property-based: Property-based
        Street-based: Street-based
  container_racing:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: 'Car racing'
    report_racing_type:
      '#type': radios
      '#title': 'What type of racing?'
      '#options':
        'Street racing': 'Street racing'
        'Portland International Raceway (PIR)': 'Portland International Raceway (PIR)'
  container_construction:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: Construction
    report_construction_type:
      '#type': radios
      '#title': 'What type of construction?'
      '#options':
        'Highway construction': 'Highway construction'
        Other: Other
  container_music:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: Music
    report_noise_music_source:
      '#type': radios
      '#title': 'What type of music?'
      '#options':
        'Street musician': 'Street musician'
        'Homeless camper stereo': 'Homeless camper stereo'
        'Car stereo': 'Car stereo'
      '#empty_value': '-'
  container_traffic:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type"]':
          value: 'Traffic or vehicle noise'
    report_vehicle_type:
      '#type': radios
      '#title': 'What type of vehicle?'
      '#options':
        'Moving vehicles': 'Moving vehicles'
        'Parked vehicles': 'Parked vehicles'
  container_submit_report:
    '#type': container
    '#states':
      visible:
        - ':input[name="report_alarm_type"]':
            value: Other
        - or
        - ':input[name="report_noise_type"]':
            value: 'Amplified announcements '
        - or
        - ':input[name="report_racing_type"]':
            value: 'Portland International Raceway (PIR)'
        - or
        - ':input[name="report_construction_type"]':
            value: Other
        - or
        - ':input[name="report_noise_type"]':
            value: 'Garbage trucks'
        - or
        - ':input[name="report_noise_type"]':
            value: HVAC
        - or
        - ':input[name="report_noise_type"]':
            value: 'Industrial/commercial noises'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Leaf blowers'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Pressure washers'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Mechanical noises'
        - or
        - ':input[name="report_noise_music_source"]':
            value: 'Street musician'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Sports and recreation'
        - or
        - ':input[name="report_vehicle_type"]':
            value: 'Parked vehicles'
    report_noise_description:
      '#type': textarea
      '#title': 'Please briefly describe what is making the noise and who is making it'
      '#required': true
    report_main_concern:
      '#type': select
      '#title': 'What is your main concern'
      '#options':
        'Too loud': 'Too loud'
        'Too frequent': 'Too frequent'
        'Constant noise': 'Constant noise'
        'Excessive vibration': 'Excessive vibration'
    report_issue_date:
      '#type': date
      '#title': 'Date issue last occurred'
      '#description': '<p>if multiple dates, indicate the last date</p>'
      '#description_display': before
      '#required': true
      '#date_date_format': ''
    report_time_start:
      '#type': webform_time
      '#title': 'What time did the noise start?'
      '#required': true
      '#time_format': 'g:i A'
      '#step': ''
    report_time_end:
      '#type': webform_time
      '#title': 'What time did the noise stop?'
      '#required': true
      '#time_format': 'g:i A'
      '#step': ''
    computed_is_allowed:
      '#type': webform_computed_twig
      '#title': 'Computed Is Allowed'
      '#wrapper_attributes':
        class:
          - d-none
      '#display_on': form
      '#mode': text
      '#template': |+
        {% set is_allowed = "false" %}
        {% if data.report_noise_type and data.report_noise_type is not iterable and data.report_noise_type == "Leaf blowers" and data.report_time_start is not empty and data.report_time_end is not empty %}

          {% set start_time_24 = data.report_time_start|date("H:i") %}
          {% set end_time_24 = data.report_time_end|date("H:i") %}
          {% set allowed_start = "07:00 AM"|date("H:i") %}
          {% set allowed_end = "07:00 PM"|date("H:i") %}
          
          {% if (start_time_24 >= allowed_start and start_time_24 <= allowed_end) and (end_time_24 >= allowed_start and end_time_24 <= allowed_end) %}
            {% set is_allowed = "true" %}
          {% endif %}
        {% endif %}
        {{ is_allowed }}

      '#whitespace': trim
      '#ajax': true
    container_leaf_blowers:
      '#type': container
      '#states':
        visible:
          ':input[name="computed_is_allowed"]':
            value: 'true'
      markup_leaf_blower:
        '#type': webform_markup
        '#markup': '<div class="alert alert--info next-steps"><h2>Information</h2><p class="mb-0">The Title 18 Noise Code allows the use of leaf blowers in residential zones from 7 a.m. to 7 p.m. seven days a week. This regulation of the time usage takes precedence over the decibel level portion of the code, similar to regulation of power tools and construction equipment. As long as leaf blowers are used within the allowable hours, no case will be opened for this noise issue.</p></div>'
    report_location:
      '#type': portland_location_picker
      '#title': 'Location of issue'
      '#location_search__title': 'Noise Location'
      '#location_address__required': true
      '#place_name__title': 'Business, park or property name'
      '#location_details__access': false
      '#location_type__access': false
      '#location_park_container__access': false
      '#location_private_owner__access': false
      '#require_city_limits': true
      '#out_of_bounds_message': 'You cannot use the City of Portland Noise Complaint online system to report noise outside the city limits. Please contact the law enforcement agency where the noise occurred.'
    computed_address:
      '#type': webform_computed_twig
      '#title': 'Computed Address'
      '#display_on': view
      '#mode': text
      '#template': '{{ data.report_location.location_address }}'
      '#whitespace': trim
      '#ajax': true
    computed_taxlot_id:
      '#type': webform_computed_twig
      '#title': 'Computed Taxlot ID'
      '#display_on': none
      '#mode': text
      '#template': '{{ data.report_location.location_taxlot_id }}'
      '#whitespace': trim
    computed_location_name:
      '#type': webform_computed_twig
      '#title': 'Computed Location Name'
      '#display_on': none
      '#mode': text
      '#template': '{{ data.report_location.place_name }}'
      '#whitespace': trim
    computed_latlon:
      '#type': webform_computed_twig
      '#title': 'Computed LatLon'
      '#display_on': none
      '#mode': text
      '#template': '{{ data.report_location.location_lat }},{{ data.report_location.location_lon}}'
      '#whitespace': trim
    section_contact:
      '#type': webform_section
      '#title': 'Your Contact Information'
      contact_name:
        '#type': textfield
        '#title': Name
        '#required': true
      contact_email:
        '#type': textfield
        '#title': Email
        '#description': 'We will use your email address to respond to your report or request if needed.'
        '#input_mask': "'alias': 'email'"
        '#required': true
      contact_address:
        '#type': portland_address_verifier
        '#title': 'Your Address'
        '#location_address__title': 'Your Address'
      computed_same_address:
        '#type': webform_computed_twig
        '#title': 'Computed Same Address'
        '#wrapper_attributes':
          class:
            - d-none
        '#mode': text
        '#template': |
          {% set noise_address = data.report_location.location_address %}
          {% set contact_address = data.contact_address.location_address ~ ", " ~ data.contact_address.location_city ~ "  " ~ data.contact_address.location_zip %}
          {% if noise_address == contact_address %}true{% else %}false{% endif %}
        '#whitespace': trim
        '#ajax': true
      contact_phone:
        '#type': textfield
        '#title': Phone
        '#input_mask': '(999) 999-9999'
        '#states':
          invisible:
            ':input[name="computed_same_address"]':
              value: 'true'
          optional:
            - ':input[name="report_noise_type"]':
                value: 'Aircraft in flight'
            - or
            - ':input[name="report_alarm_type"]':
                value: 'Car alarm'
            - or
            - ':input[name="report_noise_type"]':
                value: Animals
            - or
            - ':input[name="report_racing_type"]':
                value: 'Street racing'
            - or
            - ':input[name="report_construction_type"]':
                value: 'Highway construction'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Daycare operations or children at play'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Human voices (non-amplified)'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Homeless camper stereo'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Car stereo'
            - or
            - ':input[name="report_vehicle_type"]':
                value: 'Moving vehicles'
            - or
            - ':input[name="report_noise_type"]':
                value: Train
            - or
            - ':input[name="report_noise_type"]':
                value: Watercraft
    container_hide_if_same_address:
      '#type': container
      '#states':
        invisible:
          ':input[name="computed_same_address"]':
            value: 'true'
      report_testify_code_hearings:
        '#type': radios
        '#title': 'Are you willing to testify at code hearings?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
        '#options_display': side_by_side
        '#required': true
        '#states':
          optional:
            - ':input[name="report_noise_type"]':
                value: 'Aircraft in flight'
            - or
            - ':input[name="report_alarm_type"]':
                value: 'Car alarm'
            - or
            - ':input[name="report_noise_type"]':
                value: Animals
            - or
            - ':input[name="report_racing_type"]':
                value: 'Street racing'
            - or
            - ':input[name="report_construction_type"]':
                value: 'Highway construction'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Daycare operations or children at play'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Human voices (non-amplified)'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Homeless camper stereo'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Car stereo'
            - or
            - ':input[name="report_vehicle_type"]':
                value: 'Moving vehicles'
            - or
            - ':input[name="report_noise_type"]':
                value: Train
            - or
            - ':input[name="report_noise_type"]':
                value: Watercraft
      report_prefer_contact:
        '#type': radios
        '#title': 'Would you like us to contact you?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
        '#options_display': side_by_side
        '#required': true
        '#states':
          optional:
            - ':input[name="report_noise_type"]':
                value: 'Aircraft in flight'
            - or
            - ':input[name="report_alarm_type"]':
                value: 'Car alarm'
            - or
            - ':input[name="report_noise_type"]':
                value: Animals
            - or
            - ':input[name="report_racing_type"]':
                value: 'Street racing'
            - or
            - ':input[name="report_construction_type"]':
                value: 'Highway construction'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Daycare operations or children at play'
            - or
            - ':input[name="report_noise_type"]':
                value: 'Human voices (non-amplified)'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Homeless camper stereo'
            - or
            - ':input[name="report_noise_music_source"]':
                value: 'Car stereo'
            - or
            - ':input[name="report_vehicle_type"]':
                value: 'Moving vehicles'
            - or
            - ':input[name="report_noise_type"]':
                value: Train
            - or
            - ':input[name="report_noise_type"]':
                value: Watercraft
      section_public_records_statement:
        '#type': webform_section
        '#title': 'Public Records Statement'
        public_records_statement_standard:
          '#type': webform_markup
          '#markup': 'Information you provide to the City is a public record and may be subject to release under Oregon&rsquo;s <a data-renderer-mark="true" href="https://www.doj.state.or.us/oregon-department-of-justice/public-records/attorney-generals-public-records-and-meetings-manual/i-public-records/#:~:text=Under%20Oregon''s%20Public%20Records%20Law,committee%20of%20the%20Legislative%20Assembly" title="https://www.doj.state.or.us/oregon-department-of-justice/public-records/attorney-generals-public-records-and-meetings-manual/i-public-records/#:~:text=Under%20Oregon''s%20Public%20Records%20Law,committee%20of%20the%20Legislative%20Assembly">Public Records Law</a>. This law classifies certain information as available to the public on request. See our <a data-renderer-mark="true" href="/help/about/privacy" title="https://www.portland.gov/help/about/privacy">privacy statement</a> for more information.'
      actions:
        '#type': webform_actions
        '#title': 'Submit button(s)'
    markup_same_address:
      '#type': webform_markup
      '#states':
        visible:
          ':input[name="computed_same_address"]':
            value: 'true'
      '#markup': '<div class="alert alert--info next-steps"><h2>Next Steps</h2><p class="mb-0">The noise you reported appears to come from a source within the same building as your dwelling unit. It is the responsibility of the property manager or landlord to resolve issues between tenants within their property. If your concerns are not addressed or resolved, you may want to contact the Community Alliance of Tenants to learn about your rights as a tenant. You can find more information at <a href="https://www.oregoncat.org">www.oregoncat.org</a>.</p></div>'
  container_continue:
    '#type': container
    '#states':
      visible:
        - ':input[name="report_noise_type"]':
            value: 'Aircraft in flight'
        - or
        - ':input[name="report_alarm_type"]':
            value: 'Car alarm'
        - or
        - ':input[name="report_noise_type"]':
            value: Animals
        - or
        - ':input[name="report_racing_type"]':
            value: 'Street racing'
        - or
        - ':input[name="report_construction_type"]':
            value: 'Highway construction'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Daycare operations or children at play'
        - or
        - ':input[name="report_noise_type"]':
            value: 'Human voices (non-amplified)'
        - or
        - ':input[name="report_noise_music_source"]':
            value: 'Homeless camper stereo'
        - or
        - ':input[name="report_noise_music_source"]':
            value: 'Car stereo'
        - or
        - ':input[name="report_vehicle_type"]':
            value: 'Moving vehicles'
        - or
        - ':input[name="report_noise_type"]':
            value: Train
        - or
        - ':input[name="report_noise_type"]':
            value: Watercraft
    actions_continue:
      '#type': webform_actions
      '#title': 'Continue button'
      '#submit__label': Continue
  computed_confirmation:
    '#type': webform_computed_twig
    '#title': 'Computed Confirmation'
    '#display_on': none
    '#mode': html
    '#template': |-
      {% if data.report_noise_type == "Aircraft in flight" %}

        <!-- Airplane or helicopter -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p>
              Airplane and helicopter noise is regulated and enforced by the Port of Portland Noise Management Office.
            </p> 
            <p>
              To submit a complaint, fill out an <a href="https://www.portofportland.com/NoiseManagement/ComplaintForm">Online Complaint Form</a> with the Port of Portland or call <a href="tel:+1-503-460-4100">503-460-4100</a> or <a href="tel:+1-800-938-6647">1-800-938-6647</a>.
            </p>
            <p class="mb-0">
              The Port of Portland recognizes the impact aircraft noise can have on our community and are committed to balancing the regional demand for air transportation services with the desire for a community with minimal aircraft noise.
            </p>
        </div>

      {% elseif data.report_noise_type == "Alarm" and data.report_alarm_type == "Car alarm" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              The Noise Office is not able to respond to incidents not tied to a specific property or location. For mobile noise issues such as that from an alarm or loud stereo in a motor vehicle, you may wish to contact police non-emergency dispatch at <a href="tel:+1-503-823-3333">503-823-3333</a>. When contacting non-emergency about vehicle-related incidents, please be prepared to provide identifying information such as vehicle make, model, color, and license plate number and state.
            </p>
        </div>

      {% elseif data.report_noise_type == "Amplified announcements" and data.report_amplified_type == "Street-based" %}
        <div class="alert alert--info next-steps">
            <h2>
                Information
            </h2>
            <p class="mb-0">
              Until further notice, due to limited staff and resources, the Noise Program will not be able to respond to complaints related to noise in public streets and rights of way.  We are accepting this report, so we have a record of this complaint type to help inform our office as to the best use of our resources as caseloads allow. Currently we are focusing our limited resources to address noise violations occurring on private property. We will re-evaluate our resources again in the near future. Thank you for your support and patience.
            </p>
        </div>

      {% elseif data.report_noise_type == "Car racing" and data.report_racing_type == "Street racing" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              Street Racing is a Class A traffic violation and should be reported as a non-urgent traffic safety concern. More information: <a href="https://www.portland.gov/police/divisions/street-racing">Street Racing | Portland.gov</a>.
            </p>
        </div>

      {% elseif data.report_noise_type == "Construction" and data.report_construction_type == "Highway construction" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              CONTENT TBD.
            </p>
        </div>

      {% elseif data.report_noise_type == "Daycare operations or children at play" %}
        <div class="alert alert--info next-steps">
            <h2>
                Information
            </h2>
            <p>
              The Noise Code does not regulate noise from human voices or human action / activity / behavior that does not involve a sound producing equipment or amplifier.
            </p>
            <p class="mb-0">
              We encourage the complainant to work with police non-emergency (<a href="tel:+1-503-823-3333">503-823-3333</a>) to resolve noise issues related to disturbances from human voices or disorderly conduct. Calling the non-emergency line for each incident establishes a history and creates documentation that police are responding to ongoing issues rather than an isolated event. When speaking with dispatch, it is helpful to use the term "disturbing the peace."
            </p>
        </div>

      {% elseif data.report_noise_type == "Human voices (non-amplified)" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p>
              The Noise Code does not regulate noise from human voices or human action / activity / behavior that does not involve a sound producing equipment or amplifier.
            </p>
            <p class="mb-0">
              The Noise Office encourages the complainant to work with police non-emergency (<a href="tel:+1-503-823-3333">503-823-3333</a>) to resolve noise issues related to disturbances from human voices or disorderly conduct. Calling the non-emergency line for each incident establishes a history and creates documentation that police are responding to ongoing issues rather than an isolated event. When speaking with dispatch, it is helpful to use the term "disturbing the peace."
            </p>
        </div>

      {% elseif data.report_noise_type == "Music" and data.report_noise_music_source == "Street musician" %}
        <div class="alert alert--info next-steps">
            <h2>
                Information
            </h2>
            <p class="mb-0">
              Until further notice, due to limited staff and resources, the Noise Program will not be able to respond to complaints related to noise in public streets and rights of way.  We are accepting this report, so we have a record of this complaint type to help inform our office as to the best use of our resources as caseloads allow.   Currently we are focusing our limited resources to address noise violations occurring on private property. We will re-evaluate our resources again in the near future.  Thank you for your support and patience.
            </p>
        </div>

      {% elseif data.report_noise_type == "Music" and data.report_noise_music_source == "Homeless camper stereo" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              Please report this issue through the Homelessness and Urban Camping Impact Reduction Program's <a href="/report/campsite">Report a Campsite form</a>, and note the noise issue in the Additional Information box.
            </p>
        </div>

      {% elseif data.report_noise_type == "Music" and data.report_noise_music_source == "Car stereo" %}
        <div class="alert alert--info next-steps">
            <h2>
              Next Steps
            </h2>
            <p class="mb-0">
              For mobile noise issues such as that from a loud stereo in a motor vehicle, you may wish to contact police non-emergency dispatch at <a href="tel:+1-503-823-3333">503-823-3333</a>. When contacting non-emergency about vehicle-related incidents, please be prepared to provide identifying information such as vehicle make, model, color, and license plate number and state.
            </p>
        </div>

      {% elseif data.report_noise_type == "Traffic or vehicle noise" and data.report_vehicle_type == "Moving vehicles" %}
        <div class="alert alert--info next-steps">
            <h2>
              Next Steps
            </h2>
            <p class="mb-0">
              The Noise Office is not able to respond to incidents not tied to a specific property or location. For mobile noise issues such as that from an alarm or loud stereo in a motor vehicle, you may wish to contact police non-emergency dispatch at <a href="tel:+1-503-823-3333">503-823-3333</a>. When contacting non-emergency about vehicle-related incidents, please be prepared to provide identifying information such as vehicle make, model, color, and license plate number and state.
            </p>
        </div>

      {% elseif data.report_noise_type == "Train" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              Train activity is regulated by United State Federal Code.</p>
            <p>
              To submit a complaint, contact the US Department of Transportation, Federal Railway Administration Region 8 at <a href="tel:+1-800-724-5998">1-800-724-5998</a>.
            </p>
        </div>

      {% elseif data.report_noise_type == "Watercraft" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
            To submit a complaint, contact the Harbor Master at <a href="tel:+1-503-241-8283">503-241-8283</a>.
            </p>
        </div>  

      {% elseif data.report_noise_type == "Garbage trucks" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
             To submit your complaint, contact the Bureau of Planning and Sustainability at <a href="tel:+1-503-823-7202">503-823-7202</a>.
            </p>
        </div>  

      {% elseif data.report_noise_type == "Animals" %}
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p>
              <strong>Animal noises from residences (e.g. barking dogs):</strong> Refer to the <a href="https://www.multcopets.org/barking-dogs-other-noise-nuisances">Multnomah County Barking Dogs & Other Noise Nuisances guide</a>, or call Multnomah County Animal Services at <a href="tel:">503-988-7387</a>.
            </p>
            <p><em>Please note: Animal Services will not typically get involved in a barking dog or pet nuisance issue until the complainant takes initial steps to attempt to resolve the issue which may include attempting to talk to the owner, sending out a letter to the owner, trying neighborhood mediation and providing documentation of the issue.</em></p>
            <p class="mb-0">
              <strong>Rooster noises or other livestock issues:</strong> Contact <a href="https://www.multco.us/environmental-health-hazards/vector-control-code-enforcement">Multnomah County Vector/Nuisance</a> at <a href="tel:+1-503-988-3464">503-988-3464</a> or <a href="mailto:vector.nuisance@multco.us">vector.nuisance@multco.us</a>. For more information, see the <a href="https://www.multco.us/health/records-and-regulations/chickens-bees-farm-animals">Chickens, Bees, & Farm Animals Rules information page</a>.
            </p>
        </div>  

      {% else %}
        <p>Your report has been received.</p>
        
      {% endif %}
