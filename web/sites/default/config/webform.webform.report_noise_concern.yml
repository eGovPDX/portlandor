id: report_noise_concern
title: 'Report Noise Concern'
description: ''
categories: {  }
elements: |-
  report_noise_type:
    '#type': webform_select_other
    '#title': 'What type of noise do you want to report?'
    '#options':
      'Aircraft in flight': 'Aircraft in flight -- i.e. planes and helicopters'
      Alarm: Alarm
      Animals: 'Animals -- dogs and chickens'
      'Amplified announcements ': 'Amplified annoucements '
      'Car racing': 'Car racing'
      Construction: Construction
      'Daycare operations or children at play': 'Daycare operations or children at play'
      'Garbage trucks': 'Garbage trucks'
      HVAC: HVAC
      'Human voices (non-amplified)': 'Human voices (non-amplified)'
      'Industrial/commercial noises': 'Industrial/commercial noises'
      'Leaf blowers': 'Leaf blowers'
      'Pressure washers': 'Pressure washers'
      'Mechanical noises': 'Mechanical noises'
      Music: Music
      'Sports and recreation': 'Sports and recreation'
      'Traffic or vehicle noise': 'Traffic or vehicle noise'
      Train: Train
      Watercraft: Watercraft
    '#other__option_label': 'Something else'
    '#other__placeholder': 'Please describe'
    '#required': true
  container_alarm:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type[select]"]':
          value: Alarm
    what_alarm_type:
      '#type': radios
      '#title': 'What type of alarm?'
      '#options':
        'Car alarm': 'Car alarm'
        Other: Other
  container_amplified:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type[select]"]':
          value: 'Amplified announcements '
    what_type:
      '#type': radios
      '#title': 'What type of amplified announcements?'
      '#options':
        Property-based: Property-based
        Street-based: Street-based
  container_racing:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type[select]"]':
          value: 'Car racing'
    what_type_of_racing:
      '#type': radios
      '#title': 'What type of racing?'
      '#options':
        'Street racing': 'Street racing'
        'Portland International Raceway (PIR)': 'Portland International Raceway (PIR)'
  container_construction:
    '#type': container
    '#states':
      visible:
        ':input[name="report_noise_type[select]"]':
          value: Construction
    what_type_of_construction:
      '#type': radios
      '#title': 'What type of construction?'
      '#options':
        'Highway construction': 'Highway construction'
        Other: Other
  report_noise_music_source:
    '#type': webform_select_other
    '#title': 'Is the noise coming from one of the following?'
    '#options':
      'Concert, band or live music': 'Concert, band or live music'
      'Stereo, DJ or recorded music': 'Stereo, DJ or recorded music'
      'Street musician': 'Street musician'
    '#empty_value': '-'
    '#states':
      visible:
        ':input[name="report_noise_type[select]"]':
          value: Music
      required:
        ':input[name="report_noise_type[select]"]':
          value: Music
  container_report_info:
    '#type': container
    '#states':
      visible:
        - ':input[name="report_noise_type[select]"]':
            value: Alarm
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Amplified announcements '
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Car racing'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: Construction
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Daycare operations or children at play'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: HVAC
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Human voices non-amplified'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Industrial/commercial noises'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Leaf blowers'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Pressure washers'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Mechanical noises'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: Music
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Sports and recreation'
        - or
        - ':input[name="report_noise_type[select]"]':
            value: 'Traffic or vehicle noise'
        - or
        - ':input[name="report_noise_type[other]"]':
            filled: true
    container_not_visible:
      '#type': container
      report_noise_description:
        '#type': textarea
        '#title': 'Please briefly describe what is making the noise and who is making it'
        '#required': true
      report_main_concern:
        '#type': select
        '#title': 'What is your main concern'
        '#options':
          'Too loud': 'Too loud'
          'Too frequent': 'Too frequent'
          'Constant noise': 'Constant noise'
          'Excessive vibration': 'Excessive vibration'
      report_issue_date:
        '#type': date
        '#title': 'Date issue last occurred'
        '#description': '<p>if multiple dates, indicate the last date</p>'
        '#description_display': before
        '#required': true
        '#date_date_format': ''
      report_time_start:
        '#type': webform_time
        '#title': 'What time did the noise start?'
        '#required': true
        '#time_format': 'g:i A'
        '#step': ''
      report_time_end:
        '#type': webform_time
        '#title': 'What time did the noise stop?'
        '#required': true
        '#time_format': 'g:i A'
        '#step': ''
      computed_is_allowed:
        '#type': webform_computed_twig
        '#title': 'Computed Is Allowed'
        '#display_on': none
        '#mode': text
        '#template': |
          {% set is_allowed = "false" %}
          {% if data.report_noise_type and data.report_noise_type is not iterable and data.report_noise_type == "Leaf blowers" %}
            {% set start_time_24 = data.report_time_start|date("H:i") %}
            {% set end_time_24 = data.report_time_end|date("H:i") %}
            {% set allowed_start = "07:00 AM"|date("H:i") %}
            {% set allowed_end = "07:00 PM"|date("H:i") %}
            {% if (data.report_time_start and start_time_24 >= allowed_start) or (data.report_time_end and end_time_24 <= allowed_end) %}
              {% set is_allowed = "true" %}
            {% endif %}
          {% endif %}
          {{ is_allowed }}
        '#whitespace': trim
        '#ajax': true
      container_leaf_blowers:
        '#type': container
        '#states':
          visible:
            ':input[name="computed_is_allowed"]':
              value: 'true'
        markup_leaf_blower:
          '#type': webform_markup
          '#markup': '<div class="alert alert--info next-steps"><h2>Information</h2><p class="mb-0">The Title 18 Noise Code allows the use of leaf blowers in residential zones from 7 a.m. to 7 p.m. seven days a week. This regulation of the time usage takes precedence over the decibel level portion of the code, similar to regulation of power tools and construction equipment. As long as leaf blowers are used within the allowable hours, no case will be opened for this noise issue.</p></div>'
      report_location:
        '#type': portland_location_picker
        '#title': 'Location of issue'
        '#location_type__access': false
        '#location_park_container__access': false
        '#location_private_owner__access': false
        '#location_address__required': true
        '#location_details__access': false
      computed_address:
        '#type': webform_computed_twig
        '#title': 'Computed Address'
        '#display_on': view
        '#mode': text
        '#template': '{{ data.report_location.location_address }}'
        '#whitespace': trim
        '#ajax': true
      section_contact:
        '#type': webform_section
        '#title': 'Your Contact Information'
        contact_name:
          '#type': textfield
          '#title': Name
          '#required': true
        contact_email:
          '#type': textfield
          '#title': Email
          '#description': 'We will use your email address to respond to your report or request if needed.'
          '#input_mask': "'alias': 'email'"
          '#required': true
        contact_address:
          '#type': textfield
          '#title': Address
          '#required': true
        contact_phone:
          '#type': textfield
          '#title': Phone
          '#input_mask': '(999) 999-9999'
          '#required': true
      report_testify_code_hearings:
        '#type': radios
        '#title': 'Are you willing to testify at code hearings?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
        '#options_display': side_by_side
        '#required': true
      report_prefer_contact:
        '#type': radios
        '#title': 'Would you like us to contact you?'
        '#options':
          'Yes': 'Yes'
          'No': 'No'
        '#options_display': side_by_side
        '#required': true
      section_public_records_statement:
        '#type': webform_section
        '#title': 'Public Records Statement'
        public_records_statement_standard:
          '#type': webform_markup
          '#markup': 'Information you provide to the City is a public record and may be subject to release under Oregon&rsquo;s <a data-renderer-mark="true" href="https://www.doj.state.or.us/oregon-department-of-justice/public-records/attorney-generals-public-records-and-meetings-manual/i-public-records/#:~:text=Under%20Oregon''s%20Public%20Records%20Law,committee%20of%20the%20Legislative%20Assembly" title="https://www.doj.state.or.us/oregon-department-of-justice/public-records/attorney-generals-public-records-and-meetings-manual/i-public-records/#:~:text=Under%20Oregon''s%20Public%20Records%20Law,committee%20of%20the%20Legislative%20Assembly">Public Records Law</a>. This law classifies certain information as available to the public on request. See our <a data-renderer-mark="true" href="/help/about/privacy" title="https://www.portland.gov/help/about/privacy">privacy statement</a> for more information.'
  computed_confirmation:
    '#type': webform_computed_twig
    '#title': 'Computed Confirmation'
    '#display_on': none
    '#mode': html
    '#template': |-
      {% if data.report_noise_type == "Aircraft in flight" %}

        <!-- Airplane or helicopter -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p></p>
            <p>
              To submit a complaint, fill out an <a href="https://www.portofportland.com/NoiseManagement/ComplaintForm">Online Complaint Form</a> or call <a href="tel:+1-503-460-4100">503-460-4100</a> or <a href="tel:+1-800-938-6647">1-800-938-6647</a>.
            </p>
            <p class="mb-0">
                Airplane and helicopter noise is regulated and enforced by the Port of Portland Noise Management Office. They recognize the impact aircraft noise can have on our community, and are committed to balancing the regional demand for air transportation services with the desire for a community with minimal aircraft noise.
            </p>
        </div>

      {% elseif data.report_noise_type == "NA" %}
        <!-- not currently included in form -->
        <!-- TriMet bus or MAX train -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              To submit a complaint, contact Tri-Met customer service at <a href="mailto:hello@trimet.org">hello@trimet.org</a> or <a href="tel:+1-503-238-7433">503-238-7433</a>
            </p>
        </div>

      {% elseif data.report_noise_type == "Train" %}

        <!-- Train -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
              Train activity is regulated by United State Federal Code.</p>
            <p>
              To submit a complaint, contact the US Department of Transportation, Federal Railway Administration Region 8 at <a href="tel:+1-800-724-5998">1-800-724-5998</a>.
            </p>
        </div>

      {% elseif data.report_noise_type == "Watercraft" %}

        <!-- Boat -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
            To submit a complaint, contact the Harbor Master at <a href="tel:+1-503-241-8283">503-241-8283</a>.
            </p>
        </div>  

      {% elseif data.report_noise_type == "Garbage trucks" %}

        <!-- Garbage, Recycling, or Compost collection -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p class="mb-0">
             To submit your complaint, contact the Bureau of Planning and Sustainability at <a href="tel:+1-503-823-7202">503-823-7202</a>.
            </p>
        </div>  

      {% elseif data.report_noise_type == "NA" %}
        <!-- not currently included in form -->
        <!-- Gunshots or fireworks -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p>
              The Noise Office does not regulate the use of fireworks and/or firecrackers by individuals.
            </p>
            <p class="mb-0">
              To report gunshots or fireworks, call the police non-emergency hotline at <a href="tel:+1-503-823-3333">503-823-3333</a>.
            </p>
        </div>  

      {% elseif data.report_noise_type == "Animals" %}

        <!-- Animals, such as dogs or chickens -->
        <div class="alert alert--info next-steps">
            <h2>
                Next Steps
            </h2>
            <p>
              <strong>Animal noises from residences (e.g. barking dogs):</strong> Refer to the <a href="https://www.multcopets.org/barking-dogs-other-noise-nuisances">Multnomah County Barking Dogs & Other Noise Nuisances guide</a>, or call Multnomah County Animal Services at <a href="tel:">503-988-7387</a>.
            </p>
            <p><em>Please note: Animal Services will not typically get involved in a barking dog or pet nuisance issue until the complainant takes initial steps to attempt to resolve the issue which may include attempting to talk to the owner, sending out a letter to the owner, trying neighborhood mediation and providing documentation of the issue.</em></p>
            <p class="mb-0">
              <strong>Rooster noises or other livestock issues:</strong> Contact <a href="https://www.multco.us/environmental-health-hazards/vector-control-code-enforcement">Multnomah County Vector/Nuisance</a> at <a href="tel:+1-503-988-3464">503-988-3464</a> or <a href="mailto:vector.nuisance@multco.us">vector.nuisance@multco.us</a>. For more information, see the <a href="https://www.multco.us/health/records-and-regulations/chickens-bees-farm-animals">Chickens, Bees, & Farm Animals Rules information page</a>.
            </p>
        </div>  

      {% else %}
        <p>Your report has been received.</p>
      {% endif %}
    '#whitespace': spaceless
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
